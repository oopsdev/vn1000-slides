<?xml version="1.0" encoding="UTF-8"?>
<!-- RX flow (HTTP response): decapsulation up the stack. The NIC delivers a
     frame by DMA+IRQ, the driver hands it up via NAPI, the stack strips
     L2->L3->L4 and demuxes to a socket. Standalone copy of slide 1.3; dark
     background baked in so it reads on a light markdown page. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 600" width="1180" height="600"
     font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img"
     aria-label="Receive path: the NIC delivers a frame by DMA and interrupt, the driver hands it up via NAPI, and the stack strips L2 to L4 and demuxes to a socket">
  <defs>
    <marker id="rg" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#34d399"/></marker>
  </defs>

  <rect x="0" y="0" width="1180" height="600" fill="#0f172a"/>

  <!-- scope bands -->
  <rect x="60" y="80" width="1062" height="262" rx="10" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-opacity="0.5" stroke-dasharray="6 5"/>
  <rect x="60" y="356" width="1062" height="188" rx="10" fill="#fbbf24" fill-opacity="0.08" stroke="#fbbf24" stroke-opacity="0.5" stroke-dasharray="6 5"/>
  <text x="1150" y="210" transform="rotate(90 1150 210)" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">KERNEL STACK -&gt; APP</text>
  <text x="1150" y="450" transform="rotate(90 1150 450)" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">NIC + DRIVER (L1/L2)</text>

  <!-- left layer axis -->
  <g fill="#94a3b8" font-size="12" text-anchor="start">
    <text x="14" y="124">L7 App</text><text x="14" y="204">L4 TCP</text>
    <text x="14" y="304">L3 IP</text><text x="14" y="420">L2 Eth</text><text x="14" y="510">L1 Phy</text>
  </g>

  <!-- host title -->
  <rect x="440" y="38" width="300" height="26" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="590" y="56" text-anchor="middle" fill="#fff" font-weight="700" font-size="13">RECEIVER &#183; host B</text>

  <!-- decapsulation stack (up) -->
  <g text-anchor="middle" font-weight="700" font-size="12">
    <rect x="440" y="488" width="300" height="34" rx="5" fill="#334155"/><text x="590" y="510" fill="#9fb3c8" font-weight="400" font-family="monospace">01101011 0101 1100 ...  (frame arrives)</text>
    <rect x="440" y="396" width="60" height="40" rx="5" fill="#9c7a57"/><text x="470" y="421" fill="#fff">MAC</text>
    <rect x="500" y="396" width="54" height="40" rx="5" fill="#c0504d"/><text x="527" y="421" fill="#fff">IP</text>
    <rect x="554" y="396" width="146" height="40" rx="5" fill="#e0a55e"/><text x="627" y="421" fill="#3a2a12" font-weight="400">TCP+Data</text>
    <rect x="700" y="396" width="40" height="40" rx="5" fill="#6b5742"/><text x="720" y="421" fill="#fff">FCS</text>
    <rect x="440" y="280" width="66" height="40" rx="5" fill="#c0504d"/><text x="473" y="305" fill="#fff">IP</text>
    <rect x="506" y="280" width="66" height="40" rx="5" fill="#7c6aad"/><text x="539" y="305" fill="#fff">TCP</text>
    <rect x="572" y="280" width="168" height="40" rx="5" fill="#e0a55e"/><text x="656" y="305" fill="#3a2a12" font-weight="400">Data</text>
    <rect x="440" y="180" width="80" height="40" rx="5" fill="#7c6aad"/><text x="480" y="205" fill="#fff">TCP</text>
    <rect x="520" y="180" width="220" height="40" rx="5" fill="#e0a55e"/><text x="630" y="205" fill="#3a2a12" font-weight="400">Data</text>
    <rect x="440" y="100" width="300" height="40" rx="6" fill="#e0a55e"/><text x="590" y="125" fill="#3a2a12">Data ( HTTP response )</text>
  </g>
  <g font-size="11.5" fill="#34d399" text-anchor="start">
    <line x1="590" y1="486" x2="590" y2="438" stroke="#34d399" stroke-width="2.5" marker-end="url(#rg)"/><text x="760" y="466">NIC DMA-writes the frame; MSI -&gt; ISR -&gt; napi_schedule()</text>
    <line x1="590" y1="394" x2="590" y2="322" stroke="#34d399" stroke-width="2.5" marker-end="url(#rg)"/><text x="760" y="362">MAC filter (for me?); check FCS; eth_type_trans; strip MAC</text>
    <line x1="590" y1="278" x2="590" y2="222" stroke="#34d399" stroke-width="2.5" marker-end="url(#rg)"/><text x="760" y="253">verify IP checksum; deliver locally; strip IP header</text>
    <line x1="590" y1="178" x2="590" y2="142" stroke="#34d399" stroke-width="2.5" marker-end="url(#rg)"/><text x="760" y="165">verify TCP checksum; demux by port -&gt; socket; reassemble</text>
  </g>
  <text x="760" y="338" fill="#fbbf24" font-size="11">napi_gro_receive() coalesces same-flow segments here (GRO)</text>

  <!-- takeaway -->
  <text x="590" y="575" text-anchor="middle" fill="#cbd5e1" font-size="12.5">RX is decapsulation: the NIC delivers the frame by DMA + IRQ, the driver hands it up via NAPI, the stack strips L2-&gt;L3-&gt;L4 and demuxes the bytes to the right socket (5-tuple).</text>
</svg>
