<?xml version="1.0" encoding="UTF-8"?>
<!-- Level 2 dataflow: QEMU tap backend (loopback=off). The device bridges real
     Ethernet frames between the guest and a host tap, so the guest reaches the
     host / internet like a real NIC. Dark theme baked in. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 690" width="1000" height="690"
     font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img"
     aria-label="Level 2 tap-backend dataflow: a vertical chain - guest driver, QEMU vnic device, host tap, host network stack, peer/internet - with TX going down (writel, DMA, qemu_send_packet, tap, host stack) and RX coming up (host stack, tap, .receive, DMA write, MSI).">
  <defs>
    <marker id="tb" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#38bdf8"/></marker>
    <marker id="tg" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#34d399"/></marker>
  </defs>

  <rect x="0" y="0" width="1000" height="690" fill="#0f172a"/>
  <text x="500" y="28" text-anchor="middle" fill="#e2e8f0" font-size="19" font-weight="700">Level 2 &#8211; QEMU tap backend (loopback=off): guest &#8596; host &#8596; world</text>

  <!-- TX/RX legend -->
  <text x="430" y="46" text-anchor="end" fill="#38bdf8" font-size="12" font-weight="700">&#8595; TX (out)</text>
  <text x="570" y="46" fill="#34d399" font-size="12" font-weight="700">RX (in) &#8593;</text>

  <!-- GUEST -->
  <rect x="170" y="54" width="660" height="104" rx="10" fill="#1e293b" fill-opacity="0.4" stroke="#38bdf8" stroke-opacity="0.5" stroke-dasharray="7 5"/>
  <text x="190" y="78" fill="#7dd3fc" font-size="13" font-weight="700">GUEST (VM &#8211; vCPU on host via KVM)</text>
  <text x="500" y="104" text-anchor="middle" fill="#fff" font-size="13.5" font-weight="700">User app + Linux net stack</text>
  <text x="500" y="132" text-anchor="middle" fill="#cbd5e1" font-size="12.5">vnic driver &#8211; TX ring / RX ring in guest RAM</text>

  <!-- PCIe boundary -->
  <line x1="80" y1="184" x2="920" y2="184" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text x="500" y="178" text-anchor="middle" fill="#fbbf24" font-size="11.5" font-weight="700">PCIe &#8211; writel(TDT) doorbell &#183; pci_dma_read/write &#183; MSI (detail in the loopback diagram)</text>

  <!-- QEMU device -->
  <rect x="170" y="208" width="660" height="114" rx="8" fill="#2a2614" stroke="#fbbf24" stroke-width="2"/>
  <text x="500" y="234" text-anchor="middle" fill="#fbbf24" font-size="14.5" font-weight="700">QEMU vnic device (loopback=off) &#8211; backend-agnostic (D-30)</text>
  <text x="500" y="258" text-anchor="middle" fill="#e2e8f0" font-size="12.5">TX: pci_dma_read the packet, then qemu_send_packet(queue)</text>
  <text x="500" y="280" text-anchor="middle" fill="#e2e8f0" font-size="12.5">RX: backend calls .receive() &#8594; pci_dma_write the frame into RX ring + DD &#8594; MSI</text>
  <text x="500" y="302" text-anchor="middle" fill="#94a3b8" font-size="12">flow control: can_receive() + qemu_flush_queued_packets() (RDT / RXEN)</text>

  <!-- tap boundary -->
  <line x1="80" y1="348" x2="920" y2="348" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text x="500" y="342" text-anchor="middle" fill="#cbd5e1" font-size="11.5" font-weight="700">/dev/net/tun &#8211; raw Ethernet frames cross into the HOST KERNEL</text>

  <!-- host tap -->
  <rect x="250" y="372" width="500" height="72" rx="8" fill="#243449" stroke="#475569" stroke-width="1.5"/>
  <text x="500" y="400" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Host tap interface (vnic-tap0)</text>
  <text x="500" y="424" text-anchor="middle" fill="#cbd5e1" font-size="12.5">a raw L2 port on the host &#8211; behaves like a real NIC tap</text>

  <!-- host net stack -->
  <rect x="250" y="492" width="500" height="72" rx="8" fill="#243449" stroke="#475569" stroke-width="1.5"/>
  <text x="500" y="520" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Host network stack</text>
  <text x="500" y="544" text-anchor="middle" fill="#cbd5e1" font-size="12.5">routing / NAT / bridge (scripts/tap-nat.sh)</text>

  <!-- world -->
  <rect x="350" y="616" width="300" height="46" rx="8" fill="#243449" stroke="#64748b" stroke-width="1.5"/>
  <text x="500" y="644" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Peer / internet</text>

  <!-- TX (blue, down, left) / RX (green, up, right) between each tier -->
  <!-- guest <-> device -->
  <line x1="430" y1="158" x2="430" y2="206" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#tb)"/>
  <line x1="570" y1="206" x2="570" y2="160" stroke="#34d399" stroke-width="2.5" marker-end="url(#tg)"/>
  <!-- device <-> tap -->
  <line x1="430" y1="322" x2="430" y2="370" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#tb)"/>
  <text x="422" y="360" text-anchor="end" fill="#38bdf8" font-size="11">qemu_send_packet</text>
  <line x1="570" y1="370" x2="570" y2="324" stroke="#34d399" stroke-width="2.5" marker-end="url(#tg)"/>
  <text x="578" y="360" fill="#34d399" font-size="11">.receive()</text>
  <!-- tap <-> host stack -->
  <line x1="430" y1="444" x2="430" y2="490" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#tb)"/>
  <line x1="570" y1="490" x2="570" y2="446" stroke="#34d399" stroke-width="2.5" marker-end="url(#tg)"/>
  <!-- host stack <-> world -->
  <line x1="430" y1="564" x2="430" y2="614" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#tb)"/>
  <line x1="570" y1="614" x2="570" y2="566" stroke="#34d399" stroke-width="2.5" marker-end="url(#tg)"/>
</svg>
