<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#37474f"/>
    </marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- page -->
  <rect x="0" y="0" width="1260" height="820" fill="#ffffff"/>
  <text x="630" y="26" text-anchor="middle" font-size="20" font-weight="700" fill="#263238">Linux NIC Driver - TX Packet Transmission Path</text>

  <!-- ===== lane backgrounds ===== -->
  <rect x="10"  y="44" width="140" height="756" rx="8" fill="#fafafa" stroke="#e0e0e0"/>
  <rect x="158" y="44" width="272" height="756" rx="8" fill="#eaf6ec" stroke="#c8e6c9"/>
  <rect x="438" y="44" width="392" height="756" rx="8" fill="#fdf8e7" stroke="#fbe6a2"/>
  <rect x="838" y="44" width="406" height="756" rx="8" fill="#eef0f6" stroke="#d6dcee"/>

  <!-- lane headers -->
  <rect x="158" y="50" width="272" height="38" rx="6" fill="#43a047"/>
  <text x="294" y="74" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">NIC (Hardware)</text>
  <rect x="438" y="50" width="392" height="38" rx="6" fill="#f4b400"/>
  <text x="634" y="74" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Host Memory (RAM)</text>
  <rect x="838" y="50" width="406" height="38" rx="6" fill="#5c6bc0"/>
  <text x="1041" y="74" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">CPU Driver (Kernel Space)</text>
  <rect x="10" y="50" width="140" height="38" rx="6" fill="#eceff1"/>
  <text x="80" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#455a64">Global Steps</text>

  <!-- phase separators -->
  <g stroke="#cfd8dc" stroke-dasharray="4 4" stroke-width="1">
    <line x1="158" y1="240" x2="1244" y2="240"/>
    <line x1="158" y1="398" x2="1244" y2="398"/>
    <line x1="158" y1="490" x2="1244" y2="490"/>
    <line x1="158" y1="644" x2="1244" y2="644"/>
  </g>

  <!-- ===== left rail phase labels ===== -->
  <g text-anchor="middle" fill="#37474f">
    <text x="80" y="150" font-size="14" font-weight="700" fill="#43a047">STEP A</text>
    <text x="80" y="170" font-size="11">Initialization</text>
    <text x="80" y="184" font-size="10" fill="#78909c">(Driver Init Tx Ring)</text>

    <text x="80" y="306" font-size="14" font-weight="700" fill="#f4b400">STEP B</text>
    <text x="80" y="326" font-size="11">Transmit Request</text>
    <text x="80" y="340" font-size="10" fill="#78909c">(ndo_start_xmit)</text>

    <text x="80" y="438" font-size="14" font-weight="700" fill="#00897b">STEP C</text>
    <text x="80" y="458" font-size="11">NIC Transmit</text>
    <text x="80" y="472" font-size="10" fill="#78909c">and DMA</text>

    <text x="80" y="558" font-size="14" font-weight="700" fill="#e53935">STEP D</text>
    <text x="80" y="578" font-size="11">TX Completion</text>
    <text x="80" y="592" font-size="10" fill="#78909c">IRQ + NAPI</text>

    <text x="80" y="710" font-size="14" font-weight="700" fill="#5e35b1">STEP E</text>
    <text x="80" y="730" font-size="11">Cleanup and</text>
    <text x="80" y="744" font-size="10" fill="#78909c">Recycle</text>
  </g>

  <!-- ============================================================ -->
  <!-- PHASE A components -->
  <!-- NIC Registers (CSR) -->
  <rect x="185" y="120" width="150" height="72" rx="6" fill="#cfd8dc" stroke="#607d8b" filter="url(#sh)"/>
  <text x="260" y="136" text-anchor="middle" font-size="11" font-weight="700" fill="#37474f">NIC Registers (CSR)</text>
  <rect x="195" y="142" width="130" height="22" rx="3" fill="#eceff1" stroke="#90a4ae"/>
  <text x="260" y="157" text-anchor="middle" font-size="10.5" fill="#37474f">CSR: Tail (TDT)</text>
  <rect x="195" y="167" width="130" height="22" rx="3" fill="#eceff1" stroke="#90a4ae"/>
  <text x="260" y="182" text-anchor="middle" font-size="10.5" fill="#37474f">CSR: Head (TDH)</text>

  <!-- Tx Ring Descriptor Array (descriptors start Driver Owned / empty) -->
  <rect x="452" y="104" width="368" height="102" rx="6" fill="#fffdf5" stroke="#bdbdbd" filter="url(#sh)"/>
  <text x="636" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#5d4037">Tx Ring Descriptor Array</text>
  <g font-size="10.5">
    <rect x="466" y="124" width="152" height="18" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="542" y="137" text-anchor="middle" fill="#1b5e20">Descriptor 0</text>
    <rect x="650" y="124" width="156" height="18" rx="3" fill="#eceff1" stroke="#b0bec5"/>
    <text x="728" y="137" text-anchor="middle" fill="#455a64">Tx Buffer (skb)</text>
    <line x1="618" y1="133" x2="650" y2="133" stroke="#9e9e9e"/>

    <rect x="466" y="146" width="152" height="18" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="542" y="159" text-anchor="middle" fill="#1b5e20">Descriptor 1</text>
    <rect x="650" y="146" width="156" height="18" rx="3" fill="#eceff1" stroke="#b0bec5"/>
    <text x="728" y="159" text-anchor="middle" fill="#455a64">Tx Buffer (skb)</text>
    <line x1="618" y1="155" x2="650" y2="155" stroke="#9e9e9e"/>

    <text x="542" y="176" text-anchor="middle" fill="#9e9e9e">. . .</text>
    <text x="728" y="176" text-anchor="middle" fill="#9e9e9e">. . .</text>

    <rect x="466" y="182" width="152" height="18" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="542" y="195" text-anchor="middle" fill="#1b5e20">Descriptor N-1</text>
    <rect x="650" y="182" width="156" height="18" rx="3" fill="#eceff1" stroke="#b0bec5"/>
    <text x="728" y="195" text-anchor="middle" fill="#455a64">Tx Buffer (skb)</text>
    <line x1="618" y1="191" x2="650" y2="191" stroke="#9e9e9e"/>
  </g>

  <!-- net_device (CPU) -->
  <rect x="1050" y="120" width="180" height="58" rx="6" fill="#c5cae9" stroke="#3949ab" filter="url(#sh)"/>
  <text x="1140" y="143" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a237e">CPU Driver - Init</text>
  <text x="1140" y="160" text-anchor="middle" font-size="10.5" fill="#283593">net_device structure</text>

  <!-- PHASE A arrows -->
  <!-- A1 -->
  <line x1="1050" y1="140" x2="824" y2="140" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="846" y="120" width="182" height="15" rx="4" fill="#fff8e1" stroke="#f6c343"/>
  <text x="937" y="131" text-anchor="middle" font-size="9.5" fill="#5d4037">A1  alloc + map Tx ring (Driver Owned)</text>
  <!-- A2 route below ring to CSR -->
  <polyline points="1140,178 1140,224 255,224 255,192" fill="none" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="462" y="215" width="346" height="18" rx="4" fill="#fff8e1" stroke="#f6c343"/>
  <text x="635" y="228" text-anchor="middle" font-size="10.5" fill="#5d4037">A2  write ring base + Head/Tail (TDH/TDT) to CSR</text>

  <!-- ============================================================ -->
  <!-- PHASE B components -->
  <!-- NIC CSR doorbell (TDT) -->
  <rect x="185" y="305" width="150" height="45" rx="6" fill="#cfd8dc" stroke="#607d8b" filter="url(#sh)"/>
  <text x="260" y="324" text-anchor="middle" font-size="10.5" font-weight="700" fill="#37474f">NIC CSR</text>
  <text x="260" y="340" text-anchor="middle" font-size="9.5" fill="#455a64">Tail (TDT) doorbell</text>

  <!-- MEM phase B: skb buffer + descriptor (NIC Owned after B3), moved up -->
  <rect x="575" y="252" width="165" height="32" rx="6" fill="#eceff1" stroke="#b0bec5" filter="url(#sh)"/>
  <text x="657" y="266" text-anchor="middle" font-size="10.5" font-weight="700" fill="#455a64">Tx Packet Buffer</text>
  <text x="657" y="279" text-anchor="middle" font-size="9" fill="#607d8b">(skb data, DMA-mapped)</text>
  <rect x="575" y="290" width="165" height="48" rx="6" fill="#bbdefb" stroke="#1976d2" filter="url(#sh)"/>
  <text x="657" y="306" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0d47a1">Tx Descriptor X</text>
  <text x="657" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#0d47a1">Status = NIC Owned</text>
  <text x="657" y="332" text-anchor="middle" font-size="9" fill="#1565c0">addr + len</text>

  <!-- CPU phase B: network stack + ndo_start_xmit (gap for a visible B1 line) -->
  <rect x="1050" y="250" width="180" height="38" rx="6" fill="#ffe0b2" stroke="#fb8c00" filter="url(#sh)"/>
  <text x="1140" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">Linux Network Stack</text>
  <text x="1140" y="279" text-anchor="middle" font-size="9.5" fill="#ef6c00">IP / TCP / UDP</text>
  <rect x="1050" y="308" width="180" height="40" rx="6" fill="#c5cae9" stroke="#3949ab" filter="url(#sh)"/>
  <text x="1140" y="325" text-anchor="middle" font-size="11" font-weight="700" fill="#1a237e">ndo_start_xmit</text>
  <text x="1140" y="339" text-anchor="middle" font-size="9.5" fill="#283593">(driver TX entry)</text>

  <!-- PHASE B arrows -->
  <!-- B1 stack -> ndo_start_xmit (visible line in the gap) -->
  <line x1="1140" y1="288" x2="1140" y2="308" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="1158" y="302" text-anchor="middle" font-size="9.5" font-weight="700" fill="#5d4037">B1</text>
  <!-- B2 ndo_start_xmit -> descriptor (label floats above the line) -->
  <line x1="1050" y1="328" x2="740" y2="328" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="788" y="309" width="210" height="15" rx="4" fill="#fff8e1" stroke="#f6c343"/>
  <text x="893" y="320" text-anchor="middle" font-size="9.5" fill="#5d4037">B2  DMA-map skb, write addr + len</text>
  <!-- B3 ndo_start_xmit -> doorbell (enters NIC CSR bottom centre) -->
  <polyline points="1140,348 1140,376 260,376 260,350" fill="none" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="420" y="356" width="280" height="15" rx="4" fill="#fff8e1" stroke="#f6c343"/>
  <text x="560" y="367" text-anchor="middle" font-size="9.5" fill="#5d4037">B3  set NIC Owned + write TDT (doorbell)</text>

  <!-- ============================================================ -->
  <!-- PHASE C components -->
  <!-- network cloud (out) -->
  <ellipse cx="150" cy="442" rx="40" ry="27" fill="#eceff1" stroke="#90a4ae"/>
  <text x="150" y="438" text-anchor="middle" font-size="10.5" font-weight="700" fill="#546e7a">Network</text>
  <text x="150" y="452" text-anchor="middle" font-size="8" fill="#78909c">frame out</text>
  <!-- NIC buffer FIFO -->
  <rect x="205" y="420" width="90" height="44" rx="6" fill="#b2dfdb" stroke="#00897b" filter="url(#sh)"/>
  <text x="250" y="438" text-anchor="middle" font-size="11" font-weight="700" fill="#004d40">NIC Buffer</text>
  <text x="250" y="453" text-anchor="middle" font-size="9.5" fill="#00695c">(FIFO)</text>
  <!-- NIC DMA controller -->
  <rect x="312" y="415" width="118" height="60" rx="6" fill="#80cbc4" stroke="#00695c" filter="url(#sh)"/>
  <text x="371" y="440" text-anchor="middle" font-size="11" font-weight="700" fill="#004d40">NIC DMA</text>
  <text x="371" y="455" text-anchor="middle" font-size="11" font-weight="700" fill="#004d40">Controller</text>

  <!-- MEM phase C: what NIC reads / writes back -->
  <rect x="560" y="410" width="246" height="26" rx="5" fill="#bbdefb" stroke="#1976d2"/>
  <text x="683" y="427" text-anchor="middle" font-size="10.5" fill="#0d47a1">C1  NIC reads Descriptor X + packet</text>
  <rect x="560" y="452" width="246" height="26" rx="5" fill="#c8e6c9" stroke="#388e3c"/>
  <text x="683" y="469" text-anchor="middle" font-size="10.5" fill="#1b5e20">C3  NIC writes DD done (Driver Owned)</text>

  <!-- PHASE C arrows -->
  <!-- C1 MEM -> DMA (read) -->
  <line x1="560" y1="423" x2="430" y2="423" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- C3 DMA -> MEM (write back) -->
  <line x1="430" y1="465" x2="560" y2="465" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- C2 transmit: DMA -> FIFO -> network -->
  <line x1="312" y1="445" x2="297" y2="445" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="205" y1="445" x2="192" y2="445" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="168" y="481" width="190" height="16" rx="4" fill="#fff8e1" stroke="#f6c343"/>
  <text x="263" y="493" text-anchor="middle" font-size="9.5" fill="#5d4037">C2  transmit Ethernet frame on wire</text>

  <!-- ============================================================ -->
  <!-- PHASE D components -->
  <rect x="185" y="505" width="150" height="50" rx="6" fill="#cfd8dc" stroke="#607d8b" filter="url(#sh)"/>
  <text x="260" y="525" text-anchor="middle" font-size="10.5" font-weight="700" fill="#37474f">NIC CSR</text>
  <text x="260" y="541" text-anchor="middle" font-size="9.5" fill="#455a64">TXDONE / IRQ</text>

  <rect x="1050" y="505" width="180" height="50" rx="6" fill="#d1c4e9" stroke="#5e35b1" filter="url(#sh)"/>
  <text x="1140" y="525" text-anchor="middle" font-size="11.5" font-weight="700" fill="#311b92">Interrupt Handler</text>
  <text x="1140" y="542" text-anchor="middle" font-size="10.5" fill="#4527a0">(ISR / top half)</text>

  <rect x="1050" y="578" width="180" height="58" rx="6" fill="#b39ddb" stroke="#512da0" filter="url(#sh)"/>
  <text x="1140" y="603" text-anchor="middle" font-size="11.5" font-weight="700" fill="#311b92">NAPI Polling Thread</text>
  <text x="1140" y="620" text-anchor="middle" font-size="10" fill="#4527a0">(napi_poll / ksoftirqd)</text>

  <!-- PHASE D arrows -->
  <!-- D1 NIC -> ISR -->
  <line x1="335" y1="524" x2="1050" y2="524" stroke="#e53935" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="585" y="512" width="280" height="18" rx="4" fill="#ffebee" stroke="#ef9a9a"/>
  <text x="725" y="525" text-anchor="middle" font-size="10.5" fill="#b71c1c">D1  TX-done interrupt MSI-X (coalesced)</text>
  <!-- D2 ISR -> NIC ack/mask -->
  <line x1="1050" y1="544" x2="335" y2="544" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="560" y="546" width="230" height="18" rx="4" fill="#fff8e1" stroke="#f6c343"/>
  <text x="675" y="559" text-anchor="middle" font-size="10.5" fill="#5d4037">D2  ack + mask IRQ in CSR</text>
  <!-- D3 ISR -> NAPI -->
  <line x1="1140" y1="555" x2="1140" y2="578" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="1088" y="558" width="104" height="16" rx="4" fill="#fff8e1" stroke="#f6c343"/>
  <text x="1140" y="570" text-anchor="middle" font-size="9.5" fill="#5d4037">D3 schedule NAPI</text>

  <!-- NAPI poll thread proceeds to clean TX completions (Step D -> Step E) -->
  <line x1="1140" y1="636" x2="1140" y2="664" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- E3 the poll re-arms the interrupt at its very end, only once TX completions are drained -->
  <polyline points="1140,710 1140,730 260,730 260,555" fill="none" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="436" y="722" width="330" height="15" rx="4" fill="#fff8e1" stroke="#f6c343"/>
  <text x="601" y="733" text-anchor="middle" font-size="9.5" fill="#5d4037">E3  napi_complete_done -> driver unmasks IRQ (when ring drained)</text>

  <!-- ============================================================ -->
  <!-- PHASE E components -->
  <rect x="1050" y="664" width="180" height="46" rx="6" fill="#b2dfdb" stroke="#00897b" filter="url(#sh)"/>
  <text x="1140" y="684" text-anchor="middle" font-size="11" font-weight="700" fill="#004d40">Driver TX clean</text>
  <text x="1140" y="700" text-anchor="middle" font-size="10" fill="#00695c">(in napi_poll)</text>

  <rect x="560" y="662" width="246" height="32" rx="5" fill="#c8e6c9" stroke="#388e3c"/>
  <text x="683" y="682" text-anchor="middle" font-size="10.5" fill="#1b5e20">E1  reap Descriptor X (DD done) -> free skb</text>

  <!-- PHASE E arrows -->
  <!-- E1 MEM completed desc -> driver clean (read + free) -->
  <line x1="806" y1="678" x2="1050" y2="678" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="838" y="700" width="206" height="16" rx="4" fill="#fff8e1" stroke="#f6c343"/>
  <text x="941" y="712" text-anchor="middle" font-size="9.5" fill="#5d4037">E1  DMA-unmap + napi_consume_skb</text>
  <!-- E2 wake the TX queue back to the stack (label rotated, sits on the line) -->
  <polyline points="1230,687 1237,687 1237,272 1230,272" fill="none" stroke="#37474f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="1170" y="471" width="134" height="13" rx="4" fill="#fff8e1" stroke="#f6c343" transform="rotate(-90 1237 478)"/>
  <text x="1237" y="478" text-anchor="middle" font-size="9" fill="#5d4037" transform="rotate(-90 1237 478)">E2  netif_wake_queue</text>

  <!-- legend: descriptor ownership vs buffer -->
  <rect x="452" y="752" width="368" height="40" rx="6" fill="#ffffff" stroke="#e0e0e0"/>
  <rect x="460" y="760" width="14" height="14" rx="3" fill="#bbdefb" stroke="#1976d2"/>
  <text x="478" y="771" font-size="9.5" fill="#37474f">NIC Owned</text>
  <rect x="558" y="760" width="14" height="14" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
  <text x="576" y="771" font-size="9.5" fill="#37474f">Driver Owned</text>
  <rect x="664" y="760" width="14" height="14" rx="3" fill="#eceff1" stroke="#b0bec5"/>
  <text x="683" y="771" font-size="9.5" fill="#37474f">Tx Buffer (skb)</text>
  <text x="460" y="787" font-size="9" fill="#78909c">Descriptor fill = ownership; flips to NIC Owned at B3 (doorbell), back to Driver Owned at C3 (DD done).</text>
</svg>
