<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1178 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- page -->
  <rect x="0" y="0" width="1178" height="820" fill="#0f172a"/>
  <text x="630" y="26" text-anchor="middle" font-size="20" font-weight="700" fill="#e2e8f0">Linux NIC Driver - TX Packet Transmission Path</text>

  <!-- ===== lane backgrounds ===== -->
  <rect x="10"  y="44" width="140" height="756" rx="8" fill="#16202e" stroke="#334155"/>
  <rect x="158" y="44" width="272" height="756" rx="8" fill="#15241c" stroke="#1b3a2a"/>
  <rect x="438" y="44" width="392" height="756" rx="8" fill="#241f10" stroke="#6b5a23"/>
  <rect x="838" y="44" width="326" height="756" rx="8" fill="#1a1e30" stroke="#3a3f66"/>

  <!-- lane headers -->
  <rect x="158" y="50" width="272" height="38" rx="6" fill="#43a047"/>
  <text x="294" y="74" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">NIC (Hardware)</text>
  <rect x="438" y="50" width="392" height="38" rx="6" fill="#f4b400"/>
  <text x="634" y="74" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Host Memory (RAM)</text>
  <rect x="838" y="50" width="326" height="38" rx="6" fill="#5c6bc0"/>
  <text x="1001" y="74" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">CPU Driver (Kernel Space)</text>
  <rect x="10" y="50" width="140" height="38" rx="6" fill="#243449"/>
  <text x="80" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#cbd5e1">Global Steps</text>

  <!-- phase separators -->
  <g stroke="#334155" stroke-dasharray="4 4" stroke-width="1">
    <line x1="158" y1="240" x2="1164" y2="240"/>
    <line x1="158" y1="398" x2="1164" y2="398"/>
    <line x1="158" y1="490" x2="1164" y2="490"/>
    <line x1="158" y1="644" x2="1164" y2="644"/>
  </g>

  <!-- ===== left rail phase labels ===== -->
  <g text-anchor="middle" fill="#94a3b8">
    <text x="80" y="150" font-size="14" font-weight="700" fill="#43a047">STEP A</text>
    <text x="80" y="170" font-size="11">Initialization</text>
    <text x="80" y="184" font-size="10" fill="#94a3b8">(Driver Init Tx Ring)</text>

    <text x="80" y="306" font-size="14" font-weight="700" fill="#f4b400">STEP B</text>
    <text x="80" y="326" font-size="11">Transmit Request</text>
    <text x="80" y="340" font-size="10" fill="#94a3b8">(ndo_start_xmit)</text>

    <text x="80" y="438" font-size="14" font-weight="700" fill="#2dd4bf">STEP C</text>
    <text x="80" y="458" font-size="11">NIC Transmit</text>
    <text x="80" y="472" font-size="10" fill="#94a3b8">and DMA</text>

    <text x="80" y="558" font-size="14" font-weight="700" fill="#e53935">STEP D</text>
    <text x="80" y="578" font-size="11">TX Completion</text>
    <text x="80" y="592" font-size="10" fill="#94a3b8">IRQ + NAPI</text>

    <text x="80" y="710" font-size="14" font-weight="700" fill="#a78bfa">STEP E</text>
    <text x="80" y="730" font-size="11">Cleanup and</text>
    <text x="80" y="744" font-size="10" fill="#94a3b8">Recycle</text>
  </g>

  <!-- ============================================================ -->
  <!-- PHASE A components -->
  <!-- NIC Registers (CSR) -->
  <rect x="185" y="120" width="150" height="72" rx="6" fill="#334155" stroke="#64748b" filter="url(#sh)"/>
  <text x="260" y="136" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8">NIC Registers (CSR)</text>
  <rect x="195" y="142" width="130" height="22" rx="3" fill="#243449" stroke="#475569"/>
  <text x="260" y="157" text-anchor="middle" font-size="10.5" fill="#94a3b8">CSR: Tail (TDT)</text>
  <rect x="195" y="167" width="130" height="22" rx="3" fill="#243449" stroke="#475569"/>
  <text x="260" y="182" text-anchor="middle" font-size="10.5" fill="#94a3b8">CSR: Head (TDH)</text>

  <!-- Tx Ring Descriptor Array (descriptors start Driver Owned / empty) -->
  <rect x="452" y="104" width="368" height="102" rx="6" fill="#1e293b" stroke="#475569" filter="url(#sh)"/>
  <text x="636" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#fcd34d">Tx Ring Descriptor Array</text>
  <g font-size="10.5">
    <rect x="466" y="124" width="152" height="18" rx="3" fill="#1b3a2a" stroke="#34d399"/>
    <text x="542" y="137" text-anchor="middle" fill="#6ee7b7">Descriptor 0</text>
    <rect x="650" y="124" width="156" height="18" rx="3" fill="#243449" stroke="#475569"/>
    <text x="728" y="137" text-anchor="middle" fill="#cbd5e1">Tx Buffer (skb)</text>
    <line x1="618" y1="133" x2="650" y2="133" stroke="#64748b"/>

    <rect x="466" y="146" width="152" height="18" rx="3" fill="#1b3a2a" stroke="#34d399"/>
    <text x="542" y="159" text-anchor="middle" fill="#6ee7b7">Descriptor 1</text>
    <rect x="650" y="146" width="156" height="18" rx="3" fill="#243449" stroke="#475569"/>
    <text x="728" y="159" text-anchor="middle" fill="#cbd5e1">Tx Buffer (skb)</text>
    <line x1="618" y1="155" x2="650" y2="155" stroke="#64748b"/>

    <text x="542" y="176" text-anchor="middle" fill="#64748b">. . .</text>
    <text x="728" y="176" text-anchor="middle" fill="#64748b">. . .</text>

    <rect x="466" y="182" width="152" height="18" rx="3" fill="#1b3a2a" stroke="#34d399"/>
    <text x="542" y="195" text-anchor="middle" fill="#6ee7b7">Descriptor N-1</text>
    <rect x="650" y="182" width="156" height="18" rx="3" fill="#243449" stroke="#475569"/>
    <text x="728" y="195" text-anchor="middle" fill="#cbd5e1">Tx Buffer (skb)</text>
    <line x1="618" y1="191" x2="650" y2="191" stroke="#64748b"/>
  </g>

  <!-- net_device (CPU) -->
  <rect x="1000" y="120" width="150" height="58" rx="6" fill="#232a52" stroke="#818cf8" filter="url(#sh)"/>
  <text x="1075" y="143" text-anchor="middle" font-size="11.5" font-weight="700" fill="#c7d2fe">CPU Driver - Init</text>
  <text x="1075" y="160" text-anchor="middle" font-size="10.5" fill="#a5b4fc">net_device structure</text>

  <!-- PHASE A arrows -->
  <!-- A1 -->
  <line x1="1000" y1="140" x2="824" y2="140" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="846" y="120" width="182" height="15" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="937" y="131" text-anchor="middle" font-size="9.5" fill="#fcd34d">A1  alloc + map Tx ring (Driver Owned)</text>
  <!-- A2 route below ring to CSR -->
  <polyline points="1075,178 1075,224 255,224 255,192" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="462" y="215" width="346" height="18" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="635" y="228" text-anchor="middle" font-size="10.5" fill="#fcd34d">A2  write ring base + Head/Tail (TDH/TDT) to CSR</text>

  <!-- ============================================================ -->
  <!-- PHASE B components -->
  <!-- NIC CSR doorbell (TDT) -->
  <rect x="185" y="305" width="150" height="45" rx="6" fill="#334155" stroke="#64748b" filter="url(#sh)"/>
  <text x="260" y="324" text-anchor="middle" font-size="10.5" font-weight="700" fill="#94a3b8">NIC CSR</text>
  <text x="260" y="340" text-anchor="middle" font-size="9.5" fill="#cbd5e1">Tail (TDT) doorbell</text>

  <!-- MEM phase B: skb buffer + descriptor (NIC Owned after B3), moved up -->
  <rect x="575" y="252" width="165" height="32" rx="6" fill="#243449" stroke="#475569" filter="url(#sh)"/>
  <text x="657" y="266" text-anchor="middle" font-size="10.5" font-weight="700" fill="#cbd5e1">Tx Packet Buffer</text>
  <text x="657" y="279" text-anchor="middle" font-size="9" fill="#64748b">(skb data, DMA-mapped)</text>
  <rect x="575" y="290" width="165" height="48" rx="6" fill="#173049" stroke="#38bdf8" filter="url(#sh)"/>
  <text x="657" y="306" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7dd3fc">Tx Descriptor X</text>
  <text x="657" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#7dd3fc">Status = NIC Owned</text>
  <text x="657" y="332" text-anchor="middle" font-size="9" fill="#7dd3fc">addr + len</text>

  <!-- CPU phase B: network stack + ndo_start_xmit (gap for a visible B1 line) -->
  <rect x="1000" y="250" width="150" height="38" rx="6" fill="#2e2412" stroke="#fb923c" filter="url(#sh)"/>
  <text x="1075" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#fdba74">Linux Network Stack</text>
  <text x="1075" y="279" text-anchor="middle" font-size="9.5" fill="#fdba74">IP / TCP / UDP</text>
  <rect x="1000" y="308" width="150" height="40" rx="6" fill="#232a52" stroke="#818cf8" filter="url(#sh)"/>
  <text x="1075" y="325" text-anchor="middle" font-size="11" font-weight="700" fill="#c7d2fe">ndo_start_xmit</text>
  <text x="1075" y="339" text-anchor="middle" font-size="9.5" fill="#a5b4fc">(driver TX entry)</text>

  <!-- PHASE B arrows -->
  <!-- B1 stack -> ndo_start_xmit (visible line in the gap) -->
  <line x1="1075" y1="288" x2="1075" y2="308" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="1093" y="302" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fcd34d">B1</text>
  <!-- B2 ndo_start_xmit -> descriptor (label floats above the line) -->
  <line x1="1000" y1="328" x2="740" y2="328" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="788" y="309" width="210" height="15" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="893" y="320" text-anchor="middle" font-size="9.5" fill="#fcd34d">B2  DMA-map skb, write addr + len</text>
  <!-- B3 ndo_start_xmit -> doorbell (enters NIC CSR bottom centre) -->
  <polyline points="1075,348 1075,376 260,376 260,350" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="420" y="356" width="280" height="15" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="560" y="367" text-anchor="middle" font-size="9.5" fill="#fcd34d">B3  set NIC Owned + write TDT (doorbell)</text>

  <!-- ============================================================ -->
  <!-- PHASE C components -->
  <!-- network cloud (out) -->
  <ellipse cx="150" cy="442" rx="40" ry="27" fill="#243449" stroke="#475569"/>
  <text x="150" y="438" text-anchor="middle" font-size="10.5" font-weight="700" fill="#94a3b8">Network</text>
  <text x="150" y="452" text-anchor="middle" font-size="8" fill="#94a3b8">frame out</text>
  <!-- NIC buffer FIFO -->
  <rect x="205" y="420" width="90" height="44" rx="6" fill="#14302c" stroke="#2dd4bf" filter="url(#sh)"/>
  <text x="250" y="438" text-anchor="middle" font-size="11" font-weight="700" fill="#5eead4">NIC Buffer</text>
  <text x="250" y="453" text-anchor="middle" font-size="9.5" fill="#5eead4">(FIFO)</text>
  <!-- NIC DMA controller -->
  <rect x="312" y="415" width="118" height="60" rx="6" fill="#15403a" stroke="#5eead4" filter="url(#sh)"/>
  <text x="371" y="440" text-anchor="middle" font-size="11" font-weight="700" fill="#5eead4">NIC DMA</text>
  <text x="371" y="455" text-anchor="middle" font-size="11" font-weight="700" fill="#5eead4">Controller</text>

  <!-- MEM phase C: what NIC reads / writes back -->
  <rect x="560" y="410" width="246" height="26" rx="5" fill="#173049" stroke="#38bdf8"/>
  <text x="683" y="427" text-anchor="middle" font-size="10.5" fill="#7dd3fc">C1  NIC reads Descriptor X + packet</text>
  <rect x="560" y="452" width="246" height="26" rx="5" fill="#1b3a2a" stroke="#34d399"/>
  <text x="683" y="469" text-anchor="middle" font-size="10.5" fill="#6ee7b7">C3  NIC writes DD done (Driver Owned)</text>

  <!-- PHASE C arrows -->
  <!-- C1 MEM -> DMA (read) -->
  <line x1="560" y1="423" x2="430" y2="423" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- C3 DMA -> MEM (write back) -->
  <line x1="430" y1="465" x2="560" y2="465" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- C2 transmit: DMA -> FIFO -> network -->
  <line x1="312" y1="445" x2="297" y2="445" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="205" y1="445" x2="192" y2="445" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="168" y="481" width="190" height="16" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="263" y="493" text-anchor="middle" font-size="9.5" fill="#fcd34d">C2  transmit Ethernet frame on wire</text>

  <!-- ============================================================ -->
  <!-- PHASE D components -->
  <rect x="185" y="505" width="150" height="50" rx="6" fill="#334155" stroke="#64748b" filter="url(#sh)"/>
  <text x="260" y="525" text-anchor="middle" font-size="10.5" font-weight="700" fill="#94a3b8">NIC CSR</text>
  <text x="260" y="541" text-anchor="middle" font-size="9.5" fill="#cbd5e1">TXDONE / IRQ</text>

  <rect x="1000" y="505" width="150" height="50" rx="6" fill="#2a2142" stroke="#a78bfa" filter="url(#sh)"/>
  <text x="1075" y="525" text-anchor="middle" font-size="11.5" font-weight="700" fill="#d8b4fe">Interrupt Handler</text>
  <text x="1075" y="542" text-anchor="middle" font-size="10.5" fill="#c4b5fd">(ISR / top half)</text>

  <rect x="1000" y="578" width="150" height="58" rx="6" fill="#2a2142" stroke="#a78bfa" filter="url(#sh)"/>
  <text x="1075" y="603" text-anchor="middle" font-size="11.5" font-weight="700" fill="#d8b4fe">NAPI Polling Thread</text>
  <text x="1075" y="620" text-anchor="middle" font-size="10" fill="#c4b5fd">(napi_poll / ksoftirqd)</text>

  <!-- PHASE D arrows -->
  <!-- D1 NIC -> ISR -->
  <line x1="335" y1="524" x2="1000" y2="524" stroke="#e53935" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="585" y="512" width="280" height="18" rx="4" fill="#2e1416" stroke="#f87171"/>
  <text x="725" y="525" text-anchor="middle" font-size="10.5" fill="#fca5a5">D1  TX-done interrupt MSI-X (coalesced)</text>
  <!-- D2 ISR -> NIC ack/mask -->
  <line x1="1000" y1="544" x2="335" y2="544" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="560" y="546" width="230" height="18" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="675" y="559" text-anchor="middle" font-size="10.5" fill="#fcd34d">D2  ack + mask IRQ in CSR</text>
  <!-- D3 ISR -> NAPI -->
  <line x1="1075" y1="555" x2="1075" y2="578" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="1023" y="558" width="104" height="16" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="1075" y="570" text-anchor="middle" font-size="9.5" fill="#fcd34d">D3 schedule NAPI</text>

  <!-- NAPI poll thread proceeds to clean TX completions (Step D -> Step E) -->
  <line x1="1075" y1="636" x2="1075" y2="664" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- E3 the poll re-arms the interrupt at its very end, only once TX completions are drained -->
  <polyline points="1075,710 1075,730 260,730 260,555" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="436" y="722" width="330" height="15" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="601" y="733" text-anchor="middle" font-size="9.5" fill="#fcd34d">E3  napi_complete_done -> driver unmasks IRQ (when ring drained)</text>

  <!-- ============================================================ -->
  <!-- PHASE E components -->
  <rect x="1000" y="664" width="150" height="46" rx="6" fill="#14302c" stroke="#2dd4bf" filter="url(#sh)"/>
  <text x="1075" y="684" text-anchor="middle" font-size="11" font-weight="700" fill="#5eead4">Driver TX clean</text>
  <text x="1075" y="700" text-anchor="middle" font-size="10" fill="#5eead4">(in napi_poll)</text>

  <rect x="560" y="662" width="246" height="32" rx="5" fill="#1b3a2a" stroke="#34d399"/>
  <text x="683" y="682" text-anchor="middle" font-size="10.5" fill="#6ee7b7">E1  reap Descriptor X (DD done) -> free skb</text>

  <!-- PHASE E arrows -->
  <!-- E1 MEM completed desc -> driver clean (read + free) -->
  <line x1="806" y1="678" x2="1000" y2="678" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="807" y="670" width="192" height="16" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="903" y="682" text-anchor="middle" font-size="9" fill="#fcd34d">E1  DMA-unmap + napi_consume_skb</text>
  <!-- E2 wake the TX queue back to the stack (label rotated, sits on the line) -->
  <polyline points="1150,687 1157,687 1157,272 1150,272" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="1090" y="471" width="134" height="13" rx="4" fill="#2a2614" stroke="#fbbf24" transform="rotate(-90 1157 478)"/>
  <text x="1157" y="478" text-anchor="middle" font-size="9" fill="#fcd34d" transform="rotate(-90 1157 478)">E2  netif_wake_queue</text>

  <!-- legend: descriptor ownership vs buffer -->
  <rect x="452" y="752" width="368" height="40" rx="6" fill="#16202e" stroke="#334155"/>
  <rect x="460" y="760" width="14" height="14" rx="3" fill="#173049" stroke="#38bdf8"/>
  <text x="478" y="771" font-size="9.5" fill="#94a3b8">NIC Owned</text>
  <rect x="558" y="760" width="14" height="14" rx="3" fill="#1b3a2a" stroke="#34d399"/>
  <text x="576" y="771" font-size="9.5" fill="#94a3b8">Driver Owned</text>
  <rect x="664" y="760" width="14" height="14" rx="3" fill="#243449" stroke="#475569"/>
  <text x="683" y="771" font-size="9.5" fill="#94a3b8">Tx Buffer (skb)</text>
  <text x="460" y="787" font-size="9" fill="#94a3b8">Descriptor fill = ownership; flips to NIC Owned at B3 (doorbell), back to Driver Owned at C3 (DD done).</text>
</svg>
