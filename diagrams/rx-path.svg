<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 34 1178 731" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- page -->
  <rect x="0" y="0" width="1178" height="775" fill="#0f172a"/>

  <!-- ===== lane backgrounds ===== -->
  <rect x="10"  y="44" width="140" height="711" rx="8" fill="#16202e" stroke="#334155"/>
  <rect x="158" y="44" width="272" height="711" rx="8" fill="#15241c" stroke="#1b3a2a"/>
  <rect x="438" y="44" width="392" height="711" rx="8" fill="#241f10" stroke="#6b5a23"/>
  <rect x="838" y="44" width="326" height="711" rx="8" fill="#1a1e30" stroke="#3a3f66"/>

  <!-- lane headers -->
  <rect x="158" y="50" width="272" height="38" rx="6" fill="#43a047"/>
  <text x="294" y="74" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">NIC (Hardware)</text>
  <rect x="438" y="50" width="392" height="38" rx="6" fill="#f4b400"/>
  <text x="634" y="74" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Host Memory (RAM)</text>
  <rect x="838" y="50" width="326" height="38" rx="6" fill="#5c6bc0"/>
  <text x="1001" y="74" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">CPU Driver (Kernel Space)</text>
  <rect x="10" y="50" width="140" height="38" rx="6" fill="#243449"/>
  <text x="80" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#cbd5e1">Global Steps</text>

  <!-- phase separators -->
  <g stroke="#334155" stroke-dasharray="4 4" stroke-width="1">
    <line x1="158" y1="240" x2="1164" y2="240"/>
    <line x1="158" y1="353" x2="1164" y2="353"/>
    <line x1="158" y1="445" x2="1164" y2="445"/>
    <line x1="158" y1="599" x2="1164" y2="599"/>
  </g>

  <!-- ===== left rail phase labels ===== -->
  <g text-anchor="middle" fill="#94a3b8">
    <text x="80" y="150" font-size="14" font-weight="700" fill="#43a047">STEP A</text>
    <text x="80" y="170" font-size="11">Initialization</text>
    <text x="80" y="184" font-size="10" fill="#94a3b8">(Driver Init Ring)</text>

    <text x="80" y="267" font-size="14" font-weight="700" fill="#f4b400">STEP B</text>
    <text x="80" y="287" font-size="11">Packet Arrival</text>
    <text x="80" y="301" font-size="10" fill="#94a3b8">and DMA</text>

    <text x="80" y="393" font-size="14" font-weight="700" fill="#e53935">STEP C</text>
    <text x="80" y="413" font-size="11">Interrupt</text>
    <text x="80" y="427" font-size="10" fill="#94a3b8">Notification</text>

    <text x="80" y="513" font-size="14" font-weight="700" fill="#a78bfa">STEP D</text>
    <text x="80" y="533" font-size="11">NAPI Polling</text>
    <text x="80" y="547" font-size="10" fill="#94a3b8">and Upstream</text>

    <text x="80" y="665" font-size="14" font-weight="700" fill="#2dd4bf">STEP E</text>
    <text x="80" y="685" font-size="11">Cleanup and</text>
    <text x="80" y="699" font-size="10" fill="#94a3b8">Recycle</text>
  </g>

  <!-- ============================================================ -->
  <!-- PHASE A components -->
  <!-- NIC Registers (CSR) -->
  <rect x="185" y="120" width="150" height="72" rx="6" fill="#334155" stroke="#64748b" filter="url(#sh)"/>
  <text x="260" y="136" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8">NIC Registers (CSR)</text>
  <rect x="195" y="142" width="130" height="22" rx="3" fill="#243449" stroke="#475569"/>
  <text x="260" y="157" text-anchor="middle" font-size="10.5" fill="#94a3b8">CSR: Tail Reg</text>
  <rect x="195" y="167" width="130" height="22" rx="3" fill="#243449" stroke="#475569"/>
  <text x="260" y="182" text-anchor="middle" font-size="10.5" fill="#94a3b8">CSR: Head Reg</text>

  <!-- Rx Ring Descriptor Array -->
  <rect x="452" y="104" width="368" height="102" rx="6" fill="#1e293b" stroke="#475569" filter="url(#sh)"/>
  <text x="636" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#fcd34d">Rx Ring Descriptor Array</text>
  <!-- rows -->
  <g font-size="10.5">
    <rect x="466" y="124" width="152" height="18" rx="3" fill="#173049" stroke="#38bdf8"/>
    <text x="542" y="137" text-anchor="middle" fill="#7dd3fc">Descriptor 0</text>
    <rect x="650" y="124" width="156" height="18" rx="3" fill="#243449" stroke="#475569"/>
    <text x="728" y="137" text-anchor="middle" fill="#cbd5e1">Rx Packet Buffer</text>
    <line x1="618" y1="133" x2="650" y2="133" stroke="#64748b"/>

    <rect x="466" y="146" width="152" height="18" rx="3" fill="#173049" stroke="#38bdf8"/>
    <text x="542" y="159" text-anchor="middle" fill="#7dd3fc">Descriptor 1</text>
    <rect x="650" y="146" width="156" height="18" rx="3" fill="#243449" stroke="#475569"/>
    <text x="728" y="159" text-anchor="middle" fill="#cbd5e1">Rx Packet Buffer</text>
    <line x1="618" y1="155" x2="650" y2="155" stroke="#64748b"/>

    <text x="542" y="176" text-anchor="middle" fill="#64748b">. . .</text>
    <text x="728" y="176" text-anchor="middle" fill="#64748b">. . .</text>

    <rect x="466" y="182" width="152" height="18" rx="3" fill="#173049" stroke="#38bdf8"/>
    <text x="542" y="195" text-anchor="middle" fill="#7dd3fc">Descriptor N-1</text>
    <rect x="650" y="182" width="156" height="18" rx="3" fill="#243449" stroke="#475569"/>
    <text x="728" y="195" text-anchor="middle" fill="#cbd5e1">Rx Packet Buffer</text>
    <line x1="618" y1="191" x2="650" y2="191" stroke="#64748b"/>
  </g>

  <!-- net_device (CPU) -->
  <rect x="1000" y="120" width="150" height="58" rx="6" fill="#232a52" stroke="#818cf8" filter="url(#sh)"/>
  <text x="1075" y="143" text-anchor="middle" font-size="11.5" font-weight="700" fill="#c7d2fe">CPU Driver - Init</text>
  <text x="1075" y="160" text-anchor="middle" font-size="10.5" fill="#a5b4fc">net_device structure</text>

  <!-- PHASE A arrows (A1 -> A2 -> A3 top to bottom) -->
  <!-- A1 (label floats above the line, line stays clear) -->
  <line x1="1000" y1="138" x2="824" y2="138" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="826" y="118" width="160" height="15" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="906" y="129" text-anchor="middle" font-size="9" fill="#fcd34d">A1  alloc + map ring + buffers</text>
  <!-- A2 (label floats above the line, line stays clear) -->
  <line x1="1000" y1="170" x2="824" y2="170" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="822" y="150" width="176" height="15" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="910" y="161" text-anchor="middle" font-size="9" fill="#fcd34d">A2  write buf phys addr (NIC Owned)</text>
  <!-- A3 route below ring to CSR (drops from directly under net_device) -->
  <polyline points="1075,178 1075,224 255,224 255,192" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="470" y="215" width="330" height="18" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="635" y="228" text-anchor="middle" font-size="10.5" fill="#fcd34d">A3  write ring base + Head/Tail pointers to CSR</text>

  <!-- ============================================================ -->
  <!-- PHASE B components -->
  <!-- network cloud -->
  <ellipse cx="196" cy="277" rx="40" ry="27" fill="#243449" stroke="#475569"/>
  <text x="196" y="273" text-anchor="middle" font-size="10.5" font-weight="700" fill="#94a3b8">Network</text>
  <text x="196" y="287" text-anchor="middle" font-size="8" fill="#94a3b8">Ethernet Frame</text>
  <!-- NIC buffer -->
  <rect x="244" y="255" width="86" height="44" rx="6" fill="#14302c" stroke="#2dd4bf" filter="url(#sh)"/>
  <text x="287" y="273" text-anchor="middle" font-size="11" font-weight="700" fill="#5eead4">NIC Buffer</text>
  <text x="287" y="288" text-anchor="middle" font-size="9.5" fill="#5eead4">(FIFO)</text>
  <!-- DMA controller -->
  <rect x="340" y="250" width="90" height="56" rx="6" fill="#15403a" stroke="#5eead4" filter="url(#sh)"/>
  <text x="385" y="273" text-anchor="middle" font-size="10.5" font-weight="700" fill="#5eead4">NIC DMA</text>
  <text x="385" y="288" text-anchor="middle" font-size="10.5" font-weight="700" fill="#5eead4">Controller</text>

  <!-- MEM phase B: target packet buffer + descriptor status (stacked, leaves room for B2/B3 lines) -->
  <rect x="575" y="253" width="165" height="34" rx="6" fill="#243449" stroke="#475569" filter="url(#sh)"/>
  <text x="657" y="268" text-anchor="middle" font-size="10.5" font-weight="700" fill="#cbd5e1">Rx Packet Buffer</text>
  <text x="657" y="282" text-anchor="middle" font-size="9.5" fill="#64748b">(Descriptor X)</text>
  <rect x="575" y="295" width="165" height="50" rx="6" fill="#1b3a2a" stroke="#34d399" filter="url(#sh)"/>
  <text x="657" y="311" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6ee7b7">Ring Descriptor X</text>
  <text x="657" y="326" text-anchor="middle" font-size="10" font-weight="700" fill="#6ee7b7">Status = Driver Owned</text>
  <text x="657" y="340" text-anchor="middle" font-size="9" fill="#2e7d32">Length = ...</text>

  <!-- PHASE B arrows -->
  <!-- B1 cloud -> buffer -->
  <line x1="236" y1="277" x2="244" y2="277" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="240" y="290" text-anchor="middle" font-size="10.5" fill="#fcd34d">B1</text>
  <!-- buffer -> dma -->
  <line x1="330" y1="278" x2="340" y2="278" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- B2 dma -> packet buffer (label floats above the line) -->
  <line x1="430" y1="277" x2="575" y2="277" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="447" y="258" width="110" height="15" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="502" y="269" text-anchor="middle" font-size="9.5" fill="#fcd34d">B2  DMA write packet</text>
  <!-- B3 dma -> descriptor status (label floats above the line) -->
  <polyline points="400,306 400,320 575,320" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="432" y="301" width="134" height="15" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="499" y="312" text-anchor="middle" font-size="9.5" fill="#fcd34d">B3  set len + Driver Owned</text>

  <!-- ============================================================ -->
  <!-- PHASE C components -->
  <rect x="185" y="370" width="150" height="56" rx="6" fill="#334155" stroke="#64748b" filter="url(#sh)"/>
  <text x="260" y="393" text-anchor="middle" font-size="10.5" font-weight="700" fill="#94a3b8">NIC CSR</text>
  <text x="260" y="409" text-anchor="middle" font-size="9.5" fill="#cbd5e1">IRQ mask / Head</text>

  <rect x="1000" y="365" width="150" height="56" rx="6" fill="#2a2142" stroke="#a78bfa" filter="url(#sh)"/>
  <text x="1075" y="388" text-anchor="middle" font-size="11.5" font-weight="700" fill="#d8b4fe">Interrupt Handler</text>
  <text x="1075" y="405" text-anchor="middle" font-size="10.5" fill="#c4b5fd">(ISR / top half)</text>

  <!-- PHASE C arrows -->
  <!-- C1 NIC -> ISR -->
  <line x1="335" y1="383" x2="1000" y2="383" stroke="#e53935" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="600" y="371" width="270" height="18" rx="4" fill="#2e1416" stroke="#f87171"/>
  <text x="735" y="384" text-anchor="middle" font-size="10.5" fill="#fca5a5">C1  MSI-X hardware interrupt (PCIe)</text>
  <!-- C2 ack/mask ISR -> NIC -->
  <line x1="1000" y1="407" x2="335" y2="407" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="560" y="409" width="250" height="18" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="685" y="422" text-anchor="middle" font-size="10.5" fill="#fcd34d">C2  ack + mask IRQ in CSR</text>
  <!-- C3 schedule NAPI ISR -> NAPI -->
  <line x1="1075" y1="421" x2="1075" y2="455" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="1023" y="427" width="104" height="18" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="1075" y="440" text-anchor="middle" font-size="10" fill="#fcd34d">C3 schedule NAPI</text>

  <!-- ============================================================ -->
  <!-- PHASE D components -->
  <rect x="1000" y="455" width="150" height="70" rx="6" fill="#2a2142" stroke="#a78bfa" filter="url(#sh)"/>
  <text x="1075" y="485" text-anchor="middle" font-size="11.5" font-weight="700" fill="#d8b4fe">NAPI Polling Thread</text>
  <text x="1075" y="502" text-anchor="middle" font-size="10" fill="#c4b5fd">(napi_poll / ksoftirqd)</text>

  <rect x="560" y="461" width="246" height="26" rx="5" fill="#1b3a2a" stroke="#34d399"/>
  <text x="683" y="478" text-anchor="middle" font-size="10.5" fill="#6ee7b7">D1  Read Descriptor X (Driver-Owned)</text>
  <rect x="560" y="499" width="246" height="26" rx="5" fill="#243449" stroke="#475569"/>
  <text x="683" y="516" text-anchor="middle" font-size="10.5" fill="#cbd5e1">D2  Fetch Packet Data from Buffer X</text>

  <!-- Linux network stack -->
  <rect x="1000" y="547" width="150" height="62" rx="6" fill="#2e2412" stroke="#fb923c" filter="url(#sh)"/>
  <text x="1075" y="571" text-anchor="middle" font-size="12" font-weight="700" fill="#fdba74">Linux Network Stack</text>
  <text x="1075" y="591" text-anchor="middle" font-size="10.5" fill="#fdba74">IP / TCP / UDP</text>

  <!-- PHASE D arrows (Memory -> CPU: driver reads) -->
  <line x1="806" y1="474" x2="1000" y2="474" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="806" y1="512" x2="1000" y2="512" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- D3 NAPI -> stack -->
  <line x1="1075" y1="525" x2="1075" y2="547" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="972" y="528" width="178" height="17" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="1061" y="540" text-anchor="middle" font-size="9.5" fill="#fcd34d">D3  netif_receive_skb (sk_buff up)</text>

  <!-- D4 NAPI re-arms the interrupt below D1/D2/D3 (top-to-bottom order), only once the poll drained the ring -->
  <polyline points="1000,521 960,521 960,555 260,555 260,426" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="523" y="547" width="330" height="15" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="688" y="558" text-anchor="middle" font-size="9.5" fill="#fcd34d">D4  napi_complete_done -> driver unmasks IRQ (when ring drained)</text>

  <!-- ============================================================ -->
  <!-- PHASE E components -->
  <rect x="1000" y="619" width="150" height="46" rx="6" fill="#14302c" stroke="#2dd4bf" filter="url(#sh)"/>
  <text x="1075" y="639" text-anchor="middle" font-size="11" font-weight="700" fill="#5eead4">Driver poll tail</text>
  <text x="1075" y="655" text-anchor="middle" font-size="10" fill="#5eead4">cleanup / recycle</text>

  <!-- NAPI poll thread continues into its cleanup/recycle tail (routed around the stack box, clear of D3) -->
  <polyline points="1150,515 1157,515 1157,642 1150,642" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="1115" y="571" width="84" height="13" rx="4" fill="#2a2614" stroke="#fbbf24" transform="rotate(-90 1157 578)"/>
  <text x="1157" y="578" text-anchor="middle" font-size="8.5" fill="#fcd34d" transform="rotate(-90 1157 578)">still in napi_poll</text>

  <rect x="560" y="617" width="246" height="32" rx="5" fill="#173049" stroke="#38bdf8"/>
  <text x="683" y="637" text-anchor="middle" font-size="10.5" fill="#7dd3fc">E1  Update Descriptor X (NIC Owned, empty)</text>

  <rect x="185" y="657" width="150" height="46" rx="6" fill="#334155" stroke="#64748b" filter="url(#sh)"/>
  <text x="260" y="677" text-anchor="middle" font-size="10.5" font-weight="700" fill="#94a3b8">NIC CSR</text>
  <text x="260" y="693" text-anchor="middle" font-size="9.5" fill="#cbd5e1">Tail Reg</text>

  <!-- PHASE E arrows -->
  <line x1="1000" y1="637" x2="806" y2="637" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <polyline points="1000,657 900,657 900,680 335,680" fill="none" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="420" y="671" width="230" height="18" rx="4" fill="#2a2614" stroke="#fbbf24"/>
  <text x="535" y="684" text-anchor="middle" font-size="10.5" fill="#fcd34d">E2  write Tail to CSR (recycle)</text>

  <!-- legend: descriptor ownership vs buffer -->
  <rect x="452" y="707" width="368" height="40" rx="6" fill="#16202e" stroke="#334155"/>
  <rect x="460" y="715" width="14" height="14" rx="3" fill="#173049" stroke="#38bdf8"/>
  <text x="478" y="726" font-size="9.5" fill="#94a3b8">NIC Owned</text>
  <rect x="558" y="715" width="14" height="14" rx="3" fill="#1b3a2a" stroke="#34d399"/>
  <text x="576" y="726" font-size="9.5" fill="#94a3b8">Driver Owned</text>
  <rect x="664" y="715" width="14" height="14" rx="3" fill="#243449" stroke="#475569"/>
  <text x="682" y="726" font-size="9.5" fill="#94a3b8">Rx Packet Buffer</text>
  <text x="460" y="742" font-size="9" fill="#94a3b8">Descriptor fill = ownership; flips NIC Owned to Driver Owned (B3), back to NIC Owned (E1).</text>
</svg>
