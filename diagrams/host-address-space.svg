<?xml version="1.0" encoding="UTF-8"?>
<!-- VN1000 - how the host sees the NIC: address space, MMIO (BAR0) and DMA.
     Standalone copy of slide 2.2 (docs/slides/vnic-slides.html); dark background
     baked in so it reads on a light markdown page. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 0 1400 650" width="1400" height="650"
     font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img"
     aria-label="The CPU accesses RAM directly and the NIC registers through the BAR0 MMIO window; the NIC DMA engine reads and writes the rings in RAM; the transceiver drives the wire">
  <defs>
    <marker id="hg" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#94a3b8"/></marker>
    <marker id="hb" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#38bdf8"/></marker>
    <marker id="hgr" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#34d399"/></marker>
    <marker id="ha" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#fbbf24"/></marker>
  </defs>

  <rect x="-60" y="0" width="1400" height="650" fill="#0f172a"/>

  <!-- CPU -->
  <rect x="30" y="270" width="140" height="100" rx="8" fill="#243449" stroke="#475569" stroke-width="1.5"/>
  <text x="100" y="326" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">CPU</text>

  <!-- HOST ADDRESS SPACE -->
  <rect x="200" y="60" width="400" height="560" rx="10" fill="#1e293b" fill-opacity="0.5" stroke="#64748b" stroke-dasharray="7 5"/>
  <text x="400" y="82" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="700">HOST ADDRESS SPACE</text>

  <!-- RAM -->
  <rect x="222" y="98" width="356" height="180" rx="8" fill="#243449" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="234" y="118" fill="#38bdf8" font-size="13" font-weight="700">RAM (DRAM)</text>
  <rect x="240" y="130" width="320" height="64" rx="6" fill="#2b3b52" stroke="#475569"/>
  <text x="400" y="154" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">TX ring</text>
  <text x="400" y="172" text-anchor="middle" fill="#cbd5e1" font-size="12">descriptors -&gt; TX buffers</text>
  <rect x="240" y="202" width="320" height="64" rx="6" fill="#2b3b52" stroke="#475569"/>
  <text x="400" y="226" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">RX ring</text>
  <text x="400" y="244" text-anchor="middle" fill="#cbd5e1" font-size="12">descriptors -&gt; RX buffers</text>

  <!-- MMIO / BAR0 : the address-map view -->
  <rect x="222" y="294" width="356" height="314" rx="8" fill="#243449" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="234" y="314" fill="#fbbf24" font-size="13" font-weight="700">MMIO window (BAR0)</text>
  <text x="234" y="329" fill="#9ca3af" font-size="11">the NIC CSRs, mapped into memory - by offset:</text>
  <g font-family="monospace" font-size="12" text-anchor="middle" fill="#e2e8f0">
    <rect x="240" y="338" width="320" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="400" y="362">0x000  ID / VERSION / CAP</text>
    <rect x="240" y="382" width="320" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="400" y="406">0x010  CTRL / STATUS / MAC / MAXFRM</text>
    <rect x="240" y="426" width="320" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="400" y="450">0x100  TX ring (TDBAL..TDT)</text>
    <rect x="240" y="470" width="320" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="400" y="494">0x200  RX ring (RDBAL..RDT)</text>
    <rect x="240" y="514" width="320" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="400" y="538">0x300  ICR / ICS / IMS / IMC / ITR</text>
    <rect x="240" y="558" width="320" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="400" y="582">0x400  STATS x6 (RO)</text>
  </g>

  <!-- NIC -->
  <rect x="640" y="60" width="660" height="560" rx="10" fill="#1e293b" fill-opacity="0.5" stroke="#34d399" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="662" y="82" fill="#34d399" font-size="14" font-weight="700">NIC</text>
  <rect x="662" y="98" width="210" height="104" rx="8" fill="#243449" stroke="#34d399" stroke-width="1.5"/>
  <text x="767" y="154" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">DMA engine</text>

  <!-- full register file (CSR), grouped by function -->
  <rect x="662" y="222" width="476" height="386" rx="8" fill="#243449" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="674" y="242" fill="#fbbf24" font-size="15" font-weight="700">Registers (CSR) - full map</text>
  <g font-size="13">
    <rect x="674" y="252" width="224" height="104" rx="5" fill="#2b3b52" stroke="#475569"/>
    <text x="686" y="274" fill="#cbd5e1" font-weight="700">Identity (RO)  0x00</text>
    <text x="686" y="296" fill="#9fb3c8" font-family="monospace">ID   VERSION   CAP</text>

    <rect x="674" y="368" width="224" height="104" rx="5" fill="#2b3b52" stroke="#475569"/>
    <text x="686" y="390" fill="#cbd5e1" font-weight="700">Control  0x10</text>
    <text x="686" y="412" fill="#9fb3c8" font-family="monospace">CTRL  STATUS  MAXFRM</text>
    <text x="686" y="430" fill="#9fb3c8" font-family="monospace">MAC_LO  MAC_HI</text>

    <rect x="674" y="484" width="224" height="104" rx="5" fill="#2b3b52" stroke="#475569"/>
    <text x="686" y="506" fill="#cbd5e1" font-weight="700">TX ring  0x100</text>
    <text x="686" y="528" fill="#9fb3c8" font-family="monospace">TDBAL  TDBAH  TDLEN</text>
    <text x="686" y="546" fill="#9fb3c8" font-family="monospace">TDH  TDT</text>

    <rect x="910" y="252" width="224" height="104" rx="5" fill="#2b3b52" stroke="#475569"/>
    <text x="922" y="274" fill="#cbd5e1" font-weight="700">RX ring  0x200</text>
    <text x="922" y="296" fill="#9fb3c8" font-family="monospace">RDBAL  RDBAH  RDLEN</text>
    <text x="922" y="314" fill="#9fb3c8" font-family="monospace">RDH  RDT</text>

    <rect x="910" y="368" width="224" height="104" rx="5" fill="#2b3b52" stroke="#475569"/>
    <text x="922" y="390" fill="#cbd5e1" font-weight="700">Interrupt  0x300</text>
    <text x="922" y="412" fill="#9fb3c8" font-family="monospace">ICR  ICS  IMS</text>
    <text x="922" y="430" fill="#9fb3c8" font-family="monospace">IMC  ITR</text>

    <rect x="910" y="484" width="224" height="104" rx="5" fill="#2b3b52" stroke="#475569"/>
    <text x="922" y="506" fill="#cbd5e1" font-weight="700">Stats (RO)  0x400</text>
    <text x="922" y="528" fill="#9fb3c8" font-family="monospace">TXPKTS  TXBYTES  TXDROP</text>
    <text x="922" y="546" fill="#9fb3c8" font-family="monospace">RXPKTS  RXBYTES  RXDROP</text>
  </g>

  <!-- transceiver -->
  <rect x="1160" y="290" width="110" height="150" rx="8" fill="#243449" stroke="#475569" stroke-width="1.5"/>
  <text x="1215" y="372" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Transceiver</text>
  <text x="1215" y="392" text-anchor="middle" fill="#cbd5e1" font-size="12">(PHY)</text>
  <line x1="1138" y1="365" x2="1160" y2="365" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- arrows -->
  <line x1="170" y1="300" x2="222" y2="255" stroke="#94a3b8" stroke-width="2.5" marker-start="url(#hg)" marker-end="url(#hg)"/>
  <text x="196" y="242" text-anchor="middle" fill="#94a3b8" font-size="11">load / store</text>

  <path d="M100,370 L100,440 L222,440" fill="none" stroke="#38bdf8" stroke-width="2.5" marker-start="url(#hb)" marker-end="url(#hb)"/>
  <text x="161" y="432" text-anchor="middle" fill="#38bdf8" font-size="11">MMIO  readl / writel</text>

  <line x1="578" y1="430" x2="662" y2="340" stroke="#fbbf24" stroke-width="2" stroke-dasharray="7 5" marker-start="url(#ha)" marker-end="url(#ha)"/>
  <text x="620" y="452" text-anchor="middle" fill="#fbbf24" font-size="11">BAR0 -&gt; CSR</text>
  <text x="620" y="466" text-anchor="middle" fill="#fbbf24" font-size="11">(PCIe-mapped)</text>

  <line x1="662" y1="150" x2="578" y2="210" stroke="#34d399" stroke-width="3" marker-start="url(#hgr)" marker-end="url(#hgr)"/>
  <text x="620" y="128" text-anchor="middle" fill="#34d399" font-size="12" font-weight="700">bus-master DMA</text>
  <text x="620" y="143" text-anchor="middle" fill="#34d399" font-size="11">reads/writes the rings</text>

  <path d="M700,612 L700,634 L-30,634 L-30,322 L30,322" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#ha)"/>
  <text x="362" y="626" text-anchor="middle" fill="#fbbf24" font-size="12">MSI interrupt -&gt; CPU</text>

  <line x1="1270" y1="365" x2="1332" y2="365" stroke="#94a3b8" stroke-width="2.5" marker-start="url(#hg)" marker-end="url(#hg)"/>
  <text x="1300" y="353" text-anchor="middle" fill="#94a3b8" font-size="11">Ethernet</text>
</svg>
