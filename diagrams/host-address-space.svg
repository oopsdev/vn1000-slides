<?xml version="1.0" encoding="UTF-8"?>
<!-- VN1000 - how the host sees the NIC: address space, MMIO (BAR0) and DMA.
     Standalone copy of slide 2.2 (docs/slides/vnic-slides.html); dark background
     baked in so it reads on a light markdown page. The BAR0 window (host side)
     and the CSR register file (device side) are drawn as the SAME offset-band
     list, row-aligned, to show they are one set of registers in two spaces.
     The MMU translates the CPU access path; the device-side translation
     (IOMMU) and MSI/APIC routing are deferred to the next slide, 2.2.1. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 52 1390 590" width="1390" height="590"
     font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img"
     aria-label="The CPU accesses RAM and the NIC registers through the BAR0 MMIO window, both via the MMU (virtual to physical); the same registers are the device's CSR file; the NIC DMA engine is a bus master that reads and writes the rings in RAM; the DMA engine hands frames to the MAC and then the PHY transceiver (PCS/PMA/SerDes) drives the wire">
  <defs>
    <marker id="hg" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#94a3b8"/></marker>
    <marker id="hb" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#38bdf8"/></marker>
    <marker id="hgr" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#34d399"/></marker>
    <marker id="ha" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 z" fill="#fbbf24"/></marker>
    <marker id="hc" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#7dd3fc"/></marker>
  </defs>

  <rect x="-60" y="0" width="1390" height="650" fill="#0f172a"/>

  <!-- CPU -->
  <rect x="14" y="270" width="64" height="100" rx="8" fill="#243449" stroke="#475569" stroke-width="1.5"/>
  <text x="46" y="326" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">CPU</text>

  <!-- MMU: every CPU memory access (RAM load/store + MMIO) is translated here (VA -> PA) -->
  <rect x="128" y="278" width="58" height="84" rx="7" fill="#243449" stroke="#c084fc" stroke-width="1.5"/>
  <text x="157" y="315" text-anchor="middle" fill="#c084fc" font-size="15" font-weight="700">MMU</text>
  <text x="157" y="333" text-anchor="middle" fill="#cbd5e1" font-size="9.5">VA &#8594; PA</text>
  <line x1="78" y1="320" x2="128" y2="320" stroke="#94a3b8" stroke-width="2.5" marker-start="url(#hg)" marker-end="url(#hg)"/>

  <!-- HOST ADDRESS SPACE -->
  <rect x="200" y="60" width="400" height="560" rx="10" fill="#1e293b" fill-opacity="0.5" stroke="#64748b" stroke-dasharray="7 5"/>
  <text x="400" y="82" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="700">HOST MEMORY ADDRESS SPACE</text>

  <!-- RAM -->
  <rect x="222" y="98" width="356" height="180" rx="8" fill="#243449" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="234" y="118" fill="#38bdf8" font-size="13" font-weight="700">RAM (DRAM)</text>
  <rect x="240" y="130" width="320" height="64" rx="6" fill="#2b3b52" stroke="#475569"/>
  <text x="400" y="154" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">TX ring</text>
  <text x="400" y="172" text-anchor="middle" fill="#cbd5e1" font-size="12">descriptors -&gt; TX buffers</text>
  <rect x="240" y="202" width="320" height="64" rx="6" fill="#2b3b52" stroke="#475569"/>
  <text x="400" y="226" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">RX ring</text>
  <text x="400" y="244" text-anchor="middle" fill="#cbd5e1" font-size="12">descriptors -&gt; RX buffers</text>

  <!-- MMIO / BAR0 : the registers as host-memory offsets -->
  <rect x="222" y="294" width="356" height="314" rx="8" fill="#243449" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="234" y="314" fill="#fbbf24" font-size="13" font-weight="700">MMIO window (BAR0)</text>
  <text x="234" y="329" fill="#9ca3af" font-size="11">the NIC CSRs, mapped into host memory - by offset:</text>
  <g font-family="monospace" font-size="12" text-anchor="middle" fill="#e2e8f0">
    <rect x="240" y="338" width="320" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="400" y="362">0x000  ID / VERSION / CAP</text>
    <rect x="240" y="382" width="320" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="400" y="406">0x010  CTRL / STATUS / MAC / MAXFRM</text>
    <rect x="240" y="426" width="320" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="400" y="450">0x100  TX ring (TDBAL..TDT)</text>
    <rect x="240" y="470" width="320" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="400" y="494">0x200  RX ring (RDBAL..RDT)</text>
    <rect x="240" y="514" width="320" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="400" y="538">0x300  ICR / ICS / IMS / IMC / ITR</text>
    <rect x="240" y="558" width="320" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="400" y="582">0x400  STATS x6 (RO)</text>
  </g>

  <!-- NIC (shifted right to widen the IOMMU corridor; bottom-aligned with the host) -->
  <rect x="745" y="118" width="480" height="502" rx="10" fill="#1e293b" fill-opacity="0.5" stroke="#34d399" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="763" y="140" fill="#34d399" font-size="14" font-weight="700">NIC</text>
  <rect x="769" y="150" width="150" height="106" rx="8" fill="#243449" stroke="#34d399" stroke-width="1.5"/>
  <text x="844" y="176" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">DMA engine</text>
  <rect x="789" y="190" width="110" height="52" rx="5" fill="#2b3b52" stroke="#475569"/>
  <text x="844" y="223" text-anchor="middle" fill="#cbd5e1" font-size="12">FIFO</text>
  <!-- MAC (L2) sits between the DMA engine and the PHY; MAC<->PHY is the MII-family interface (see slide 1.5) -->
  <rect x="975" y="150" width="72" height="106" rx="8" fill="#243449" stroke="#34d399" stroke-width="1.5"/>
  <text x="1011" y="190" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">MAC</text>
  <text x="1011" y="209" text-anchor="middle" fill="#cbd5e1" font-size="9">framing/FCS</text>
  <rect x="1103" y="150" width="106" height="106" rx="8" fill="#243449" stroke="#475569" stroke-width="1.5"/>
  <text x="1156" y="190" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Transceiver</text>
  <text x="1156" y="210" text-anchor="middle" fill="#cbd5e1" font-size="9">PHY - PCS/PMA/SerDes</text>
  <!-- DMA-engine FIFO <-> MAC <-> PHY: frames both ways (TX out, RX in); MAC<->PHY is the MII -->
  <line x1="919" y1="203" x2="975" y2="203" stroke="#94a3b8" stroke-width="2.5" marker-start="url(#hg)" marker-end="url(#hg)"/>
  <text x="947" y="182" text-anchor="middle" fill="#94a3b8" font-size="10">frames</text>
  <line x1="1047" y1="203" x2="1103" y2="203" stroke="#94a3b8" stroke-width="2.5" marker-start="url(#hg)" marker-end="url(#hg)"/>
  <text x="1075" y="182" text-anchor="middle" fill="#94a3b8" font-size="10">MII</text>
  <!-- DMA engine is driven by the ring registers (base / head / tail) in the CSR -->
  <line x1="844" y1="256" x2="844" y2="294" stroke="#94a3b8" stroke-width="2" marker-start="url(#hg)" marker-end="url(#hg)"/>
  <text x="854" y="280" fill="#94a3b8" font-size="10">ring base / head / tail</text>

  <!-- Register file (CSR): the SAME registers as BAR0, in the device - same offset bands, row-aligned -->
  <rect x="763" y="294" width="446" height="314" rx="8" fill="#243449" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="775" y="314" fill="#fbbf24" font-size="13" font-weight="700">Register file (CSR)</text>
  <text x="775" y="329" fill="#9ca3af" font-size="11">the same registers BAR0 maps - here, in the device:</text>
  <g font-family="monospace" font-size="12" text-anchor="middle" fill="#e2e8f0">
    <rect x="779" y="338" width="414" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="986" y="362">0x000  ID VERSION CAP</text>
    <rect x="779" y="382" width="414" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="986" y="406">0x010  CTRL STATUS MAC_LO MAC_HI MAXFRM</text>
    <rect x="779" y="426" width="414" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="986" y="450">0x100  TDBAL TDBAH TDLEN TDH TDT</text>
    <rect x="779" y="470" width="414" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="986" y="494">0x200  RDBAL RDBAH RDLEN RDH RDT</text>
    <rect x="779" y="514" width="414" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="986" y="538">0x300  ICR ICS IMS IMC ITR</text>
    <rect x="779" y="558" width="414" height="38" rx="4" fill="#2b3b52" stroke="#475569"/><text x="986" y="582">0x400  TXPKTS TXBYTES RXPKTS RXBYTES TXDROP RXDROP</text>
  </g>

  <!-- arrows: RAM load/store + MMIO both exit through the MMU -->
  <line x1="186" y1="300" x2="222" y2="255" stroke="#94a3b8" stroke-width="2.5" marker-start="url(#hg)" marker-end="url(#hg)"/>
  <text x="205" y="248" text-anchor="middle" fill="#94a3b8" font-size="11">load / store</text>

  <path d="M157,362 L157,440 L222,440" fill="none" stroke="#38bdf8" stroke-width="2.5" marker-start="url(#hb)" marker-end="url(#hb)"/>
  <text x="150" y="418" text-anchor="end" fill="#38bdf8" font-size="11">MMIO  readl / writel</text>

  <!-- TDBAL / RDBAL hold the base addresses of the rings in RAM -->
  <path d="M779,445 H625 V162 H562" fill="none" stroke="#7dd3fc" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#hc)"/>
  <path d="M779,489 H605 V236 H562" fill="none" stroke="#7dd3fc" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#hc)"/>
  <text x="590" y="156" fill="#7dd3fc" font-size="10">TDBAL</text>
  <text x="590" y="230" fill="#7dd3fc" font-size="10">RDBAL</text>

  <!-- BAR0 and CSR are the same registers (row-aligned); placed low to clear the pointer lines -->
  <line x1="578" y1="560" x2="779" y2="560" stroke="#fbbf24" stroke-width="2" stroke-dasharray="7 5" marker-start="url(#ha)" marker-end="url(#ha)"/>
  <text x="678" y="540" text-anchor="middle" fill="#fbbf24" font-size="11">same regs</text>
  <text x="678" y="552" text-anchor="middle" fill="#fbbf24" font-size="11">(BAR0 = CSR)</text>

  <!-- bus-master DMA: engine <-> RAM (orthogonal, routed above the TDBAL/RDBAL pointer lines).
       Address translation (the IOMMU, IOVA -> PA) is drawn on the next slide, 2.2.1. -->
  <path d="M769,200 H672 V123 H578" fill="none" stroke="#34d399" stroke-width="3" marker-start="url(#hgr)" marker-end="url(#hgr)"/>
  <text x="844" y="80" text-anchor="middle" fill="#34d399" font-size="12" font-weight="700">bus-master DMA</text>
  <text x="844" y="93" text-anchor="middle" fill="#34d399" font-size="11">reads/writes the rings</text>

  <path d="M785,612 L785,634 L-30,634 L-30,322 L14,322" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#ha)"/>
  <text x="362" y="626" text-anchor="middle" fill="#fbbf24" font-size="12">interrupt -&gt; CPU</text>

  <line x1="1209" y1="203" x2="1283" y2="203" stroke="#94a3b8" stroke-width="2.5" marker-start="url(#hg)" marker-end="url(#hg)"/>
  <text x="1246" y="193" text-anchor="middle" fill="#94a3b8" font-size="11">Ethernet</text>
</svg>
