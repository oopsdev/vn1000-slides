<?xml version="1.0" encoding="UTF-8"?>
<!-- TCP TX flow (HTTP GET): encapsulation at the source, IP forwarding at the
     router, decapsulation at the destination; end-to-end vs hop-by-hop scopes.
     Standalone copy of slide 1.1 (docs/slides/vnic-slides.html); dark background
     baked in so it reads on a light markdown page. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" width="1280" height="620"
     font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img"
     aria-label="Encapsulation at the source, IP forwarding at the router, decapsulation at the destination, with end-to-end and hop-by-hop scopes">
  <defs>
    <marker id="ab" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#38bdf8"/></marker>
    <marker id="agr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#34d399"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#94a3b8"/></marker>
  </defs>

  <rect x="0" y="0" width="1280" height="600" fill="#0f172a"/>

  <!-- scope bands (behind) -->
  <rect x="70" y="80" width="1142" height="160" rx="10" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-opacity="0.5" stroke-dasharray="6 5"/>
  <rect x="70" y="252" width="1142" height="292" rx="10" fill="#fbbf24" fill-opacity="0.08" stroke="#fbbf24" stroke-opacity="0.5" stroke-dasharray="6 5"/>
  <text x="1240" y="160" transform="rotate(90 1240 160)" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">END-TO-END (L4-L7)</text>
  <text x="1240" y="398" transform="rotate(90 1240 398)" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">HOP-BY-HOP (L1-L3)</text>

  <!-- left layer axis -->
  <g fill="#94a3b8" font-size="12" text-anchor="start">
    <text x="14" y="124">L7 App</text><text x="14" y="204">L4 TCP</text>
    <text x="14" y="304">L3 IP</text><text x="14" y="420">L2 Eth</text><text x="14" y="510">L1 Phy</text>
  </g>

  <!-- node titles -->
  <g text-anchor="middle" fill="#fff" font-weight="700" font-size="13">
    <rect x="90" y="38" width="300" height="26" rx="6" fill="#1e293b" stroke="#334155"/><text x="240" y="56">SOURCE &#183; host A</text>
    <rect x="470" y="38" width="334" height="26" rx="6" fill="#1e293b" stroke="#334155"/><text x="637" y="56">ROUTER &#183; IP forward (one of many)</text>
    <rect x="890" y="38" width="300" height="26" rx="6" fill="#1e293b" stroke="#334155"/><text x="1040" y="56">DESTINATION &#183; host B</text>
  </g>

  <!-- ===== SOURCE: encapsulation (down) ===== -->
  <g text-anchor="middle" font-weight="700" font-size="12">
    <rect x="90" y="100" width="300" height="40" rx="6" fill="#e0a55e"/><text x="240" y="125" fill="#3a2a12">Data ( HTTP GET / )</text>
    <rect x="90" y="180" width="80" height="40" rx="5" fill="#7c6aad"/><text x="130" y="205" fill="#fff">TCP</text>
    <rect x="170" y="180" width="220" height="40" rx="5" fill="#e0a55e"/><text x="280" y="205" fill="#3a2a12" font-weight="400">Data</text>
    <rect x="90" y="280" width="66" height="40" rx="5" fill="#c0504d"/><text x="123" y="305" fill="#fff">IP</text>
    <rect x="156" y="280" width="66" height="40" rx="5" fill="#7c6aad"/><text x="189" y="305" fill="#fff">TCP</text>
    <rect x="222" y="280" width="168" height="40" rx="5" fill="#e0a55e"/><text x="306" y="305" fill="#3a2a12" font-weight="400">Data</text>
    <rect x="90" y="396" width="60" height="40" rx="5" fill="#9c7a57"/><text x="120" y="421" fill="#fff">MAC</text>
    <rect x="150" y="396" width="54" height="40" rx="5" fill="#c0504d"/><text x="177" y="421" fill="#fff">IP</text>
    <rect x="204" y="396" width="146" height="40" rx="5" fill="#e0a55e"/><text x="277" y="421" fill="#3a2a12" font-weight="400">TCP+Data</text>
    <rect x="350" y="396" width="40" height="40" rx="5" fill="#6b5742"/><text x="370" y="421" fill="#fff">FCS</text>
    <rect x="90" y="488" width="300" height="34" rx="5" fill="#334155"/><text x="240" y="510" fill="#9fb3c8" font-weight="400" font-family="monospace">01101011 0101 1100 ...</text>
  </g>
  <g font-size="11" fill="#38bdf8" text-anchor="start">
    <line x1="240" y1="142" x2="240" y2="178" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#ab)"/><text x="250" y="165">+ TCP header (ports, seq, cksum)</text>
    <line x1="240" y1="222" x2="240" y2="278" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#ab)"/><text x="250" y="253">+ IP header (IP_S-&gt;IP_D, TTL=64)</text>
    <line x1="240" y1="322" x2="240" y2="393" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#ab)"/><text x="250" y="360">+ MAC + FCS (dst=MAC_R)</text>
    <line x1="240" y1="438" x2="240" y2="485" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#ab)"/><text x="250" y="466">serialize</text>
  </g>

  <!-- link 1 -->
  <line x1="392" y1="505" x2="466" y2="505" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ag)"/>
  <text x="429" y="497" text-anchor="middle" fill="#94a3b8" font-size="11">link 1</text>

  <!-- ===== ROUTER (one of many along the path) ===== -->
  <!-- ghost frames behind: this single router stands for the many hops a packet crosses -->
  <rect x="442" y="246" width="338" height="262" rx="10" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-opacity="0.45" stroke-dasharray="2 3"/>
  <rect x="454" y="258" width="338" height="262" rx="10" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-opacity="0.8"/>
  <rect x="466" y="270" width="338" height="262" rx="10" fill="#1e293b" fill-opacity="0.45" stroke="#475569"/>
  <g text-anchor="middle" font-size="12">
    <rect x="486" y="280" width="298" height="40" rx="5" fill="#c0504d"/><text x="635" y="305" fill="#fff" font-weight="700">IP_S -&gt; IP_D   (unchanged)</text>
    <text x="635" y="338" fill="#fbbf24" font-size="11.5">TTL 64 -&gt; 63 &#183; IP checksum recomputed</text>
    <rect x="486" y="372" width="298" height="28" rx="4" fill="#9c7a57"/><text x="635" y="390" fill="#fff" font-size="11.5">frame IN - dst=MAC_R &#183; src=MAC_S</text>
    <rect x="486" y="404" width="298" height="28" rx="4" fill="#9c7a57" stroke="#fbbf24" stroke-width="2"/><text x="635" y="422" fill="#fff" font-size="11.5">frame OUT - dst=MAC_D &#183; src=MAC_R (rewritten)</text>
    <rect x="486" y="488" width="298" height="34" rx="5" fill="#334155"/><text x="635" y="510" fill="#9fb3c8" font-family="monospace">bits in  &#183;  bits out</text>
  </g>
  <line x1="476" y1="482" x2="476" y2="322" stroke="#38bdf8" stroke-width="2" marker-end="url(#ab)"/>
  <text x="476" y="404" text-anchor="middle" fill="#38bdf8" font-size="10.5" transform="rotate(-90 476 404)">decap L1-&gt;L3</text>
  <line x1="796" y1="322" x2="796" y2="482" stroke="#34d399" stroke-width="2" marker-end="url(#agr)"/>
  <text x="796" y="404" text-anchor="middle" fill="#34d399" font-size="10.5" transform="rotate(90 796 404)">re-encap L3-&gt;L1</text>
  <text x="635" y="462" text-anchor="middle" fill="#94a3b8" font-size="11">&#183; &#183; &#183;  many such hops &#8212; each router repeats this  &#183; &#183; &#183;</text>

  <!-- link 2 -->
  <line x1="804" y1="505" x2="890" y2="505" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ag)"/>
  <text x="847" y="497" text-anchor="middle" fill="#94a3b8" font-size="11">link 2</text>

  <!-- ===== DESTINATION: decapsulation (up) ===== -->
  <g text-anchor="middle" font-weight="700" font-size="12">
    <rect x="890" y="488" width="300" height="34" rx="5" fill="#334155"/><text x="1040" y="510" fill="#9fb3c8" font-weight="400" font-family="monospace">01101011 0101 1100 ...</text>
    <rect x="890" y="396" width="60" height="40" rx="5" fill="#9c7a57"/><text x="920" y="421" fill="#fff">MAC</text>
    <rect x="950" y="396" width="54" height="40" rx="5" fill="#c0504d"/><text x="977" y="421" fill="#fff">IP</text>
    <rect x="1004" y="396" width="146" height="40" rx="5" fill="#e0a55e"/><text x="1077" y="421" fill="#3a2a12" font-weight="400">TCP+Data</text>
    <rect x="1150" y="396" width="40" height="40" rx="5" fill="#6b5742"/><text x="1170" y="421" fill="#fff">FCS</text>
    <rect x="890" y="280" width="66" height="40" rx="5" fill="#c0504d"/><text x="923" y="305" fill="#fff">IP</text>
    <rect x="956" y="280" width="66" height="40" rx="5" fill="#7c6aad"/><text x="989" y="305" fill="#fff">TCP</text>
    <rect x="1022" y="280" width="168" height="40" rx="5" fill="#e0a55e"/><text x="1106" y="305" fill="#3a2a12" font-weight="400">Data</text>
    <rect x="890" y="180" width="80" height="40" rx="5" fill="#7c6aad"/><text x="930" y="205" fill="#fff">TCP</text>
    <rect x="970" y="180" width="220" height="40" rx="5" fill="#e0a55e"/><text x="1080" y="205" fill="#3a2a12" font-weight="400">Data</text>
    <rect x="890" y="100" width="300" height="40" rx="6" fill="#e0a55e"/><text x="1040" y="125" fill="#3a2a12">Data ( HTTP GET / )</text>
  </g>
  <g font-size="11" fill="#34d399" text-anchor="end">
    <line x1="1040" y1="486" x2="1040" y2="438" stroke="#34d399" stroke-width="2.5" marker-end="url(#agr)"/><text x="1030" y="466">frame in</text>
    <line x1="1040" y1="394" x2="1040" y2="322" stroke="#34d399" stroke-width="2.5" marker-end="url(#agr)"/><text x="1030" y="360">strip MAC, check FCS</text>
    <line x1="1040" y1="278" x2="1040" y2="222" stroke="#34d399" stroke-width="2.5" marker-end="url(#agr)"/><text x="1030" y="253">for me? -&gt; strip IP</text>
    <line x1="1040" y1="178" x2="1040" y2="142" stroke="#34d399" stroke-width="2.5" marker-end="url(#agr)"/><text x="1030" y="165">demux port -&gt; socket</text>
  </g>

  <!-- takeaway -->
  <text x="640" y="574" text-anchor="middle" fill="#cbd5e1" font-size="15">Only the transport segment (L4+) is end-to-end; IP (L3) and below are hop-by-hop - every router processes the packet up to L3.</text>
  <text x="640" y="596" text-anchor="middle" fill="#9ca3af" font-size="13.5">The IP addresses are preserved end to end, but each hop re-routes, decrements TTL, recomputes the IP checksum, and rebuilds the L2 frame (new src/dst MAC).</text>
</svg>
