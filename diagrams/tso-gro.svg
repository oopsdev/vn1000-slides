<?xml version="1.0" encoding="UTF-8"?>
<!-- TSO/GSO (TX segmentation) vs GRO/LRO (RX coalescing): one large skb <-> many
     MSS-sized wire frames, and where the split/merge happens (software in the
     stack/NAPI vs hardware in the device). Dark theme baked in. bg-knowledge 7.8. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 580" width="1020" height="580"
     font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img"
     aria-label="On TX one large TCP super-skb is segmented into many MSS-sized wire frames (GSO in software before the driver, TSO in the device); on RX many MSS frames are coalesced back into one large skb (GRO in the NAPI poll, LRO in the device).">
  <defs>
    <marker id="db" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#38bdf8"/></marker>
    <marker id="dg" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#34d399"/></marker>
  </defs>

  <rect x="0" y="0" width="1020" height="580" fill="#0f172a"/>
  <text x="510" y="32" text-anchor="middle" fill="#e2e8f0" font-size="19" font-weight="700">TSO / GSO (TX segmentation) vs GRO / LRO (RX coalescing) &#8211; one skb &#8596; many MSS frames</text>

  <line x1="510" y1="56" x2="510" y2="396" stroke="#334155" stroke-dasharray="5 5"/>

  <!-- ===================== TX (left): segmentation, 1 -> N ===================== -->
  <text x="268" y="76" text-anchor="middle" fill="#38bdf8" font-size="17" font-weight="700">TX &#8211; segmentation: 1 big skb &#8595; N &#215; MSS frames</text>
  <text x="268" y="100" text-anchor="middle" fill="#94a3b8" font-size="13">one super-skb &#183; gso_size = MSS &#183; TCP/IP runs ONCE</text>

  <g text-anchor="middle" font-size="14" font-weight="700">
    <rect x="58"  y="110" width="64"  height="48" rx="5" fill="#7c6aad"/><text x="90"  y="139" fill="#fff">TCP</text>
    <rect x="122" y="110" width="356" height="48" rx="5" fill="#e0a55e"/><text x="300" y="139" fill="#3a2a12">TCP payload ~64 KB</text>
  </g>

  <text x="268" y="184" text-anchor="middle" fill="#cbd5e1" font-size="12.5"><tspan font-weight="700" fill="#fbbf24">GSO</tspan> (sw): split before the driver &#8594; driver sees N MSS skbs</text>
  <text x="268" y="206" text-anchor="middle" fill="#cbd5e1" font-size="12.5"><tspan font-weight="700" fill="#34d399">TSO</tspan> (hw): 1 super-skb in (SG, 1 doorbell) &#8594; the <b>device splits</b></text>

  <!-- driver <-> device boundary -->
  <line x1="40" y1="228" x2="980" y2="228" stroke="#fbbf24" stroke-width="1.3" stroke-opacity="0.7" stroke-dasharray="7 5"/>
  <text x="510" y="222" text-anchor="middle" fill="#fbbf24" font-size="11.5">driver &#8596; device boundary &#183; descriptors &#183; doorbell &#183; MSI &#183; (GSO/GRO above = SW, TSO/LRO below = device)</text>

  <line x1="268" y1="160" x2="268" y2="282" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#db)"/>
  <text x="280" y="256" fill="#38bdf8" font-size="12.5">segment &#8594; N</text>

  <!-- representative wire frame + solid ghost copies behind (x N); front is opaque -->
  <rect x="52" y="282" width="400" height="48" rx="5" fill="#1b2735" stroke="#475569"/>
  <rect x="60" y="290" width="400" height="48" rx="5" fill="#22303f" stroke="#64748b"/>
  <rect x="68" y="298" width="400" height="48" rx="5" fill="#243449"/>
  <g text-anchor="middle" font-weight="700">
    <rect x="68"  y="298" width="52"  height="48" rx="5" fill="#9c7a57"/><text x="94"  y="320" fill="#fff" font-size="13">Eth</text><text x="94"  y="337" fill="#e8d8c8" font-size="10" font-weight="400">14</text>
    <rect x="120" y="298" width="52"  height="48" rx="5" fill="#c0504d"/><text x="146" y="320" fill="#fff" font-size="13">IP</text><text x="146" y="337" fill="#f3d2cf" font-size="10" font-weight="400">20</text>
    <rect x="172" y="298" width="52"  height="48" rx="5" fill="#7c6aad"/><text x="198" y="320" fill="#fff" font-size="13">TCP</text><text x="198" y="337" fill="#ddd3f0" font-size="10" font-weight="400">20</text>
    <rect x="224" y="298" width="188" height="48" rx="5" fill="#e0a55e"/><text x="318" y="327" fill="#3a2a12" font-size="13">&#8804; MSS data</text>
    <rect x="412" y="298" width="56"  height="48" rx="5" fill="#6b5742"/><text x="440" y="327" fill="#fff" font-size="13">FCS</text>
  </g>
  <text x="268" y="366" text-anchor="middle" fill="#94a3b8" font-size="12">N wire frames, each &#8804; MTU &#183; N &#8776; 64 KB / MSS &#8776; 44</text>
  <text x="268" y="384" text-anchor="middle" fill="#94a3b8" font-size="12">each: header replicated &#183; per-segment seq / IP-id / checksum</text>

  <!-- ===================== RX (right): coalescing, N -> 1 ===================== -->
  <text x="752" y="76" text-anchor="middle" fill="#34d399" font-size="17" font-weight="700">RX &#8211; coalescing: N &#215; MSS frames &#8593; 1 big skb</text>
  <text x="752" y="100" text-anchor="middle" fill="#94a3b8" font-size="13">coalesced skb &#183; stack runs ONCE on the merged buffer</text>

  <g text-anchor="middle" font-size="14" font-weight="700">
    <rect x="542" y="110" width="64"  height="48" rx="5" fill="#7c6aad"/><text x="574" y="139" fill="#fff">TCP</text>
    <rect x="606" y="110" width="356" height="48" rx="5" fill="#e0a55e"/><text x="784" y="139" fill="#3a2a12">merged payload (many MSS)</text>
  </g>

  <text x="752" y="184" text-anchor="middle" fill="#cbd5e1" font-size="12.5"><tspan font-weight="700" fill="#34d399">LRO</tspan> (hw): device merges segments &#8594; fewer / larger skbs</text>
  <text x="752" y="206" text-anchor="middle" fill="#cbd5e1" font-size="12.5"><tspan font-weight="700" fill="#fbbf24">GRO</tspan> (sw, default): napi_gro_receive merges in the NAPI poll</text>

  <line x1="752" y1="282" x2="752" y2="160" stroke="#34d399" stroke-width="2.5" marker-end="url(#dg)"/>
  <text x="764" y="256" fill="#34d399" font-size="12.5">coalesce &#8594; 1</text>

  <rect x="536" y="282" width="400" height="48" rx="5" fill="#1b2735" stroke="#475569"/>
  <rect x="544" y="290" width="400" height="48" rx="5" fill="#22303f" stroke="#64748b"/>
  <rect x="552" y="298" width="400" height="48" rx="5" fill="#243449"/>
  <g text-anchor="middle" font-weight="700">
    <rect x="552" y="298" width="52"  height="48" rx="5" fill="#9c7a57"/><text x="578" y="320" fill="#fff" font-size="13">Eth</text><text x="578" y="337" fill="#e8d8c8" font-size="10" font-weight="400">14</text>
    <rect x="604" y="298" width="52"  height="48" rx="5" fill="#c0504d"/><text x="630" y="320" fill="#fff" font-size="13">IP</text><text x="630" y="337" fill="#f3d2cf" font-size="10" font-weight="400">20</text>
    <rect x="656" y="298" width="52"  height="48" rx="5" fill="#7c6aad"/><text x="682" y="320" fill="#fff" font-size="13">TCP</text><text x="682" y="337" fill="#ddd3f0" font-size="10" font-weight="400">20</text>
    <rect x="708" y="298" width="188" height="48" rx="5" fill="#e0a55e"/><text x="802" y="327" fill="#3a2a12" font-size="13">&#8804; MSS data</text>
    <rect x="896" y="298" width="56"  height="48" rx="5" fill="#6b5742"/><text x="924" y="327" fill="#fff" font-size="13">FCS</text>
  </g>
  <text x="752" y="366" text-anchor="middle" fill="#94a3b8" font-size="12">N same-flow frames arrive &#8594; fewer trips up the stack</text>
  <text x="752" y="384" text-anchor="middle" fill="#94a3b8" font-size="12">GRO is preferred for forwarding (LRO is lossy to un-coalesce)</text>

  <!-- ===================== legend ===================== -->
  <rect x="40" y="404" width="940" height="156" rx="8" fill="#16202e" stroke="#334155"/>
  <text x="58" y="430" fill="#e2e8f0" font-size="14" font-weight="700">Key</text>
  <!-- header colour key (top-right) -->
  <g font-size="12" fill="#cbd5e1" text-anchor="start">
    <rect x="640" y="419" width="17" height="13" rx="2" fill="#9c7a57"/><text x="662" y="430">Eth</text>
    <rect x="706" y="419" width="17" height="13" rx="2" fill="#c0504d"/><text x="728" y="430">IP</text>
    <rect x="762" y="419" width="17" height="13" rx="2" fill="#7c6aad"/><text x="784" y="430">TCP</text>
    <rect x="832" y="419" width="17" height="13" rx="2" fill="#e0a55e"/><text x="854" y="430">data</text>
    <rect x="902" y="419" width="17" height="13" rx="2" fill="#6b5742"/><text x="924" y="430">FCS</text>
  </g>
  <g font-size="13.5" fill="#cbd5e1">
    <text x="58" y="458"><tspan fill="#fff" font-weight="700">MTU</tspan> = 1500 B (max L3 payload).   <tspan fill="#fff" font-weight="700">MSS</tspan> = MTU &#8722; IP(20) &#8722; TCP(20) = 1460 B (TCP data per segment).</text>
    <text x="58" y="486"><tspan fill="#fff" font-weight="700">Wire frame</tspan> = Eth(14) + IP(20) + TCP(20) + &#8804;MSS data + FCS(4)   &#8804;   MTU + 18 = 1518 B.</text>
    <text x="58" y="514"><tspan fill="#fbbf24" font-weight="700">GSO / GRO</tspan> = software (stack / NAPI poll);   <tspan fill="#34d399" font-weight="700">TSO / LRO</tspan> = hardware (the device).  Both need checksum offload (7.7).</text>
    <text x="58" y="542"><tspan fill="#fff" font-weight="700">VN1000 today</tspan>: GRO on (napi_gro_receive); TSO / LRO / checksum offload = backlog A6 (TX engine &#8594; a segmenter).</text>
  </g>
</svg>
