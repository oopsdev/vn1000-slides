<?xml version="1.0" encoding="UTF-8"?>
<!-- TSO/GSO (TX segmentation) vs GRO/LRO (RX coalescing): one large skb <-> many
     MSS-sized wire frames, and where the split/merge happens (software in the
     stack/NAPI vs hardware in the device). Dark theme baked in. bg-knowledge 7.8. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 564" width="1300" height="564"
     font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img"
     aria-label="On TX one large TCP super-skb is segmented into many MSS-sized wire frames (GSO does it in software before the driver, TSO does it in the device); on RX many MSS frames are coalesced back into one large skb (GRO in the NAPI poll, LRO in the device).">
  <defs>
    <marker id="db" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#38bdf8"/></marker>
    <marker id="dg" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#34d399"/></marker>
  </defs>

  <rect x="0" y="0" width="1300" height="564" fill="#0f172a"/>
  <text x="650" y="30" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">TSO / GSO (TX segmentation) vs GRO / LRO (RX coalescing) &#8211; one skb &#8596; many MSS frames</text>

  <line x1="650" y1="52" x2="650" y2="392" stroke="#334155" stroke-dasharray="5 5"/>

  <!-- ===================== TX (left): segmentation, 1 -> N ===================== -->
  <text x="330" y="70" text-anchor="middle" fill="#38bdf8" font-size="15" font-weight="700">TX &#8211; segmentation: 1 big skb &#8595; N &#215; MSS frames</text>

  <!-- big super-skb at the top (stack runs once) -->
  <text x="330" y="92" text-anchor="middle" fill="#94a3b8" font-size="11.5">one super-skb &#183; gso_size = MSS &#183; TCP/IP runs ONCE</text>
  <g text-anchor="middle" font-size="12" font-weight="700">
    <rect x="100" y="98" width="56"  height="40" rx="4" fill="#7c6aad"/><text x="128" y="123" fill="#fff">TCP</text>
    <rect x="156" y="98" width="404" height="40" rx="4" fill="#e0a55e"/><text x="358" y="123" fill="#3a2a12">TCP payload ~64 KB</text>
  </g>

  <!-- the two ways to segment -->
  <text x="330" y="166" text-anchor="middle" fill="#cbd5e1" font-size="12"><tspan font-weight="700" fill="#fbbf24">GSO</tspan> (software): split just before the driver &#8594; driver sees N MSS skbs</text>
  <text x="330" y="186" text-anchor="middle" fill="#cbd5e1" font-size="12"><tspan font-weight="700" fill="#34d399">TSO</tspan> (hardware): 1 super-skb to the driver (SG: few desc, 1 doorbell) &#8594; <b>device splits</b></text>

  <!-- driver <-> device boundary -->
  <line x1="40" y1="212" x2="1260" y2="212" stroke="#fbbf24" stroke-width="1.3" stroke-opacity="0.7" stroke-dasharray="7 5"/>
  <text x="650" y="207" text-anchor="middle" fill="#fbbf24" font-size="11">driver &#8596; device boundary &#183; descriptors &#183; doorbell &#183; MSI &#183; (GSO/GRO above = SW, TSO/LRO below = device)</text>

  <!-- segment arrow (crosses the boundary) -->
  <line x1="330" y1="140" x2="330" y2="296" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#db)"/>
  <text x="340" y="250" fill="#38bdf8" font-size="11">segment &#8594; N</text>

  <!-- representative wire frame + solid ghost copies behind (x N); front is opaque -->
  <rect x="130" y="280" width="360" height="44" rx="4" fill="#1b2735" stroke="#475569"/>
  <rect x="140" y="290" width="360" height="44" rx="4" fill="#22303f" stroke="#64748b"/>
  <rect x="150" y="300" width="360" height="44" rx="4" fill="#243449"/>
  <g text-anchor="middle" font-size="11" font-weight="700">
    <rect x="150" y="300" width="44"  height="44" rx="4" fill="#9c7a57"/><text x="172" y="320" fill="#fff">Eth</text><text x="172" y="334" fill="#e8d8c8" font-size="9" font-weight="400">14</text>
    <rect x="194" y="300" width="44"  height="44" rx="4" fill="#c0504d"/><text x="216" y="320" fill="#fff">IP</text><text x="216" y="334" fill="#f3d2cf" font-size="9" font-weight="400">20</text>
    <rect x="238" y="300" width="44"  height="44" rx="4" fill="#7c6aad"/><text x="260" y="320" fill="#fff">TCP</text><text x="260" y="334" fill="#ddd3f0" font-size="9" font-weight="400">20</text>
    <rect x="282" y="300" width="180" height="44" rx="4" fill="#e0a55e"/><text x="372" y="326" fill="#3a2a12">&#8804; MSS data</text>
    <rect x="462" y="300" width="48"  height="44" rx="4" fill="#6b5742"/><text x="486" y="326" fill="#fff">FCS</text>
  </g>
  <text x="330" y="362" text-anchor="middle" fill="#94a3b8" font-size="11">N wire frames, each &#8804; MTU &#183; N &#8776; 64 KB / MSS &#8776; 44</text>
  <text x="330" y="380" text-anchor="middle" fill="#94a3b8" font-size="11">each: header replicated &#183; per-segment seq / IP-id / checksum</text>

  <!-- ===================== RX (right): coalescing, N -> 1 ===================== -->
  <text x="970" y="70" text-anchor="middle" fill="#34d399" font-size="15" font-weight="700">RX &#8211; coalescing: N &#215; MSS frames &#8593; 1 big skb</text>

  <text x="970" y="92" text-anchor="middle" fill="#94a3b8" font-size="11.5">coalesced skb &#183; stack runs ONCE on the merged buffer</text>
  <g text-anchor="middle" font-size="12" font-weight="700">
    <rect x="740" y="98" width="56"  height="40" rx="4" fill="#7c6aad"/><text x="768" y="123" fill="#fff">TCP</text>
    <rect x="796" y="98" width="404" height="40" rx="4" fill="#e0a55e"/><text x="998" y="123" fill="#3a2a12">merged payload (many MSS)</text>
  </g>

  <text x="970" y="166" text-anchor="middle" fill="#cbd5e1" font-size="12"><tspan font-weight="700" fill="#34d399">LRO</tspan> (hardware): device merges same-flow segments &#8594; driver gets fewer/larger skbs</text>
  <text x="970" y="186" text-anchor="middle" fill="#cbd5e1" font-size="12"><tspan font-weight="700" fill="#fbbf24">GRO</tspan> (software, on by default): napi_gro_receive merges in the NAPI poll</text>

  <!-- coalesce arrow (up, crosses the boundary) -->
  <line x1="970" y1="296" x2="970" y2="140" stroke="#34d399" stroke-width="2.5" marker-end="url(#dg)"/>
  <text x="980" y="250" fill="#34d399" font-size="11">coalesce &#8594; 1</text>

  <!-- representative RX wire frame + solid ghost copies behind; front is opaque -->
  <rect x="780" y="280" width="360" height="44" rx="4" fill="#1b2735" stroke="#475569"/>
  <rect x="790" y="290" width="360" height="44" rx="4" fill="#22303f" stroke="#64748b"/>
  <rect x="800" y="300" width="360" height="44" rx="4" fill="#243449"/>
  <g text-anchor="middle" font-size="11" font-weight="700">
    <rect x="800"  y="300" width="44"  height="44" rx="4" fill="#9c7a57"/><text x="822"  y="320" fill="#fff">Eth</text><text x="822" y="334" fill="#e8d8c8" font-size="9" font-weight="400">14</text>
    <rect x="844"  y="300" width="44"  height="44" rx="4" fill="#c0504d"/><text x="866"  y="320" fill="#fff">IP</text><text x="866" y="334" fill="#f3d2cf" font-size="9" font-weight="400">20</text>
    <rect x="888"  y="300" width="44"  height="44" rx="4" fill="#7c6aad"/><text x="910"  y="320" fill="#fff">TCP</text><text x="910" y="334" fill="#ddd3f0" font-size="9" font-weight="400">20</text>
    <rect x="932"  y="300" width="180" height="44" rx="4" fill="#e0a55e"/><text x="1022" y="326" fill="#3a2a12">&#8804; MSS data</text>
    <rect x="1112" y="300" width="48"  height="44" rx="4" fill="#6b5742"/><text x="1136" y="326" fill="#fff">FCS</text>
  </g>
  <text x="970" y="362" text-anchor="middle" fill="#94a3b8" font-size="11">N same-flow frames arrive &#8594; fewer trips up the stack</text>
  <text x="970" y="380" text-anchor="middle" fill="#94a3b8" font-size="11">GRO is preferred for forwarding (LRO is lossy to un-coalesce)</text>

  <!-- ===================== legend ===================== -->
  <rect x="40" y="402" width="1220" height="142" rx="8" fill="#16202e" stroke="#334155"/>
  <text x="58" y="426" fill="#e2e8f0" font-size="13" font-weight="700">Key</text>
  <g font-size="12.5" fill="#cbd5e1">
    <text x="58" y="450"><tspan fill="#fff" font-weight="700">MTU</tspan> = 1500 B (max L3 payload).   <tspan fill="#fff" font-weight="700">MSS</tspan> = MTU &#8722; IP(20) &#8722; TCP(20) = 1460 B  (TCP data carried per segment).</text>
    <text x="58" y="474"><tspan fill="#fff" font-weight="700">Wire frame</tspan> = Eth(14) + IP(20) + TCP(20) + &#8804;MSS data + FCS(4)   &#8804;   MTU + 18 = 1518 B.</text>
    <text x="58" y="498"><tspan fill="#fbbf24" font-weight="700">GSO / GRO</tspan> = software (stack / NAPI poll);   <tspan fill="#34d399" font-weight="700">TSO / LRO</tspan> = hardware (the device).  Both need checksum offload (7.7).</text>
    <text x="58" y="522"><tspan fill="#fff" font-weight="700">VN1000 today</tspan>: GRO on (napi_gro_receive); TSO / LRO / checksum offload = backlog A6 (the device TX engine would become a segmenter).</text>
  </g>
  <!-- header colour key -->
  <g font-size="11" fill="#cbd5e1" text-anchor="start">
    <rect x="900" y="440" width="16" height="12" rx="2" fill="#9c7a57"/><text x="921" y="450">Eth</text>
    <rect x="965" y="440" width="16" height="12" rx="2" fill="#c0504d"/><text x="986" y="450">IP</text>
    <rect x="1020" y="440" width="16" height="12" rx="2" fill="#7c6aad"/><text x="1041" y="450">TCP</text>
    <rect x="1085" y="440" width="16" height="12" rx="2" fill="#e0a55e"/><text x="1106" y="450">data</text>
    <rect x="1150" y="440" width="16" height="12" rx="2" fill="#6b5742"/><text x="1171" y="450">FCS</text>
  </g>
</svg>
