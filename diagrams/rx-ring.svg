<?xml version="1.0" encoding="UTF-8"?>
<!-- VN1000 RX ring snapshot - device produces, driver consumes (datasheet 5.5).
     Dark background baked in so it reads on a light markdown page. Cells encode
     ownership through DD: green = driver-owned (DD=1, a received frame), amber =
     device-owned (DD=0, posted-empty buffer awaiting a frame), gray = the one
     slot kept unused. On RX the *device* is the producer (it advances RDH), so
     next_to_use is unused - next_to_clean is the only driver cursor.
     Example: device wrote 3 frames (RDH = 3); driver has not polled (NTC = 0). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 472" width="1000" height="472"
     font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img"
     aria-label="RX ring snapshot: the device DMA-writes received frames and the driver consumes them. Green slots hold received frames (DD=1), amber slots are posted-empty buffers owned by the device (DD=0), one gray slot is kept unused.">
  <rect x="0" y="0" width="1000" height="472" fill="#0f172a"/>

  <text x="500" y="38" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">RX ring &#8211; device produces, driver consumes</text>
  <text x="500" y="62" text-anchor="middle" fill="#94a3b8" font-size="13">N = RDLEN / 16 descriptors, circular (wraps 7 &#8594; 0)</text>

  <!-- index row -->
  <g fill="#64748b" font-size="13" text-anchor="middle" font-family="monospace">
    <text x="138" y="98">0</text><text x="238" y="98">1</text><text x="338" y="98">2</text><text x="438" y="98">3</text>
    <text x="538" y="98">4</text><text x="638" y="98">5</text><text x="738" y="98">6</text><text x="838" y="98">7</text>
  </g>

  <!-- cells: 0,1,2 = FULL (driver-owned DD=1, received); 3,4,5,6 = EMPTY (device-owned DD=0); 7 = unused -->
  <g text-anchor="middle">
    <!-- i0 -->
    <rect x="90"  y="110" width="96" height="72" rx="6" fill="#1b3a2a" stroke="#34d399" stroke-width="1.5"/>
    <text x="138" y="149" fill="#6ee7b7" font-size="17" font-weight="700">FULL</text>
    <text x="138" y="170" fill="#34d399" font-size="11" font-family="monospace">DD=1</text>
    <!-- i1 -->
    <rect x="190" y="110" width="96" height="72" rx="6" fill="#1b3a2a" stroke="#34d399" stroke-width="1.5"/>
    <text x="238" y="149" fill="#6ee7b7" font-size="17" font-weight="700">FULL</text>
    <text x="238" y="170" fill="#34d399" font-size="11" font-family="monospace">DD=1</text>
    <!-- i2 -->
    <rect x="290" y="110" width="96" height="72" rx="6" fill="#1b3a2a" stroke="#34d399" stroke-width="1.5"/>
    <text x="338" y="149" fill="#6ee7b7" font-size="17" font-weight="700">FULL</text>
    <text x="338" y="170" fill="#34d399" font-size="11" font-family="monospace">DD=1</text>
    <!-- i3 -->
    <rect x="390" y="110" width="96" height="72" rx="6" fill="#3a3115" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="438" y="149" fill="#fcd34d" font-size="16" font-weight="700">EMPTY</text>
    <text x="438" y="170" fill="#fbbf24" font-size="11" font-family="monospace">DD=0</text>
    <!-- i4 -->
    <rect x="490" y="110" width="96" height="72" rx="6" fill="#3a3115" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="538" y="149" fill="#fcd34d" font-size="16" font-weight="700">EMPTY</text>
    <text x="538" y="170" fill="#fbbf24" font-size="11" font-family="monospace">DD=0</text>
    <!-- i5 -->
    <rect x="590" y="110" width="96" height="72" rx="6" fill="#3a3115" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="638" y="149" fill="#fcd34d" font-size="16" font-weight="700">EMPTY</text>
    <text x="638" y="170" fill="#fbbf24" font-size="11" font-family="monospace">DD=0</text>
    <!-- i6 -->
    <rect x="690" y="110" width="96" height="72" rx="6" fill="#3a3115" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="738" y="149" fill="#fcd34d" font-size="16" font-weight="700">EMPTY</text>
    <text x="738" y="170" fill="#fbbf24" font-size="11" font-family="monospace">DD=0</text>
    <!-- i7 -->
    <rect x="790" y="110" width="96" height="72" rx="6" fill="#22303f" stroke="#475569" stroke-width="1.5"/>
    <text x="838" y="149" fill="#94a3b8" font-size="15" font-weight="700">unused</text>
    <text x="838" y="170" fill="#64748b" font-size="11" font-family="monospace">&#8211;</text>
  </g>

  <!-- cursors: NTC@0, RDH@3, RDT@7 -->
  <g text-anchor="middle">
    <polygon points="138,188 129,207 147,207" fill="#e2e8f0"/>
    <text x="138" y="230" fill="#e2e8f0" font-size="13" font-weight="700" font-family="monospace">NTC</text>
    <polygon points="438,188 429,207 447,207" fill="#e2e8f0"/>
    <text x="438" y="230" fill="#e2e8f0" font-size="13" font-weight="700" font-family="monospace">RDH</text>
    <polygon points="838,188 829,207 847,207" fill="#e2e8f0"/>
    <text x="838" y="230" fill="#e2e8f0" font-size="13" font-weight="700" font-family="monospace">RDT</text>
  </g>

  <!-- legend -->
  <g font-size="14">
    <rect x="110" y="276" width="18" height="18" rx="3" fill="#1b3a2a" stroke="#34d399"/>
    <text x="138" y="290" fill="#e2e8f0"><tspan fill="#6ee7b7" font-weight="700">FULL</tspan> &#8211; DD = 1, driver-owned &#8211; a received frame, driver to process (up the stack)</text>
    <text x="960" y="290" text-anchor="end" fill="#6ee7b7" font-family="monospace">[NTC, RDH)</text>

    <rect x="110" y="308" width="18" height="18" rx="3" fill="#3a3115" stroke="#fbbf24"/>
    <text x="138" y="322" fill="#e2e8f0"><tspan fill="#fcd34d" font-weight="700">EMPTY</tspan> &#8211; DD = 0, device-owned &#8211; a posted buffer, awaiting a frame</text>
    <text x="960" y="322" text-anchor="end" fill="#fcd34d" font-family="monospace">[RDH, RDT)</text>

    <rect x="110" y="340" width="18" height="18" rx="3" fill="#22303f" stroke="#475569"/>
    <text x="138" y="354" fill="#e2e8f0"><tspan fill="#94a3b8" font-weight="700">unused</tspan> &#8211; one slot kept unused (tells empty from full)</text>
  </g>

  <g font-size="13" fill="#cbd5e1">
    <text x="110" y="396"><tspan fill="#e2e8f0" font-weight="700">NTC</tspan> (next_to_clean): the only driver cursor on RX &#8211; consume a frame, refill the slot,</text>
    <text x="110" y="416">then publish RDT = next_to_clean once at the end of the poll.</text>
    <text x="110" y="444"><tspan fill="#e2e8f0" font-weight="700">NTU</tspan> (next_to_use): unused on RX &#8211; the device is the producer (it advances RDH, the driver does not fill these slots).</text>
  </g>
</svg>
