<?xml version="1.0" encoding="UTF-8"?>
<!-- VN1000 TX ring snapshot - driver produces, device consumes (datasheet 5.5).
     Dark background baked in so it reads on a light markdown page. Cells encode
     ownership through DD: green = driver-owned (DD=1, completed), amber =
     device-owned (DD=0, in flight), gray = free. Software cursors NTU
     (next_to_use, producer) and NTC (next_to_clean, reclaim) sit alongside the
     hardware pointers TDH (device consumer) and TDT (driver producer).
     Example: driver filled 0..4 (NTU = TDT = 5); device sent 0..1 (DD=1,
     TDH = 2) and is sending 2..4; driver has not reclaimed yet (NTC = 0). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 472" width="1000" height="472"
     font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img"
     aria-label="TX ring snapshot: the driver fills descriptors and the device sends them. Green slots are completed (DD=1) awaiting reclaim, amber slots are submitted and device-owned (DD=0), gray slots are free.">
  <rect x="0" y="0" width="1000" height="472" fill="#0f172a"/>

  <text x="500" y="38" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">TX ring &#8211; driver produces, device consumes</text>
  <text x="500" y="62" text-anchor="middle" fill="#94a3b8" font-size="13">N = TDLEN / 16 descriptors, circular (wraps 7 &#8594; 0)</text>

  <!-- index row -->
  <g fill="#64748b" font-size="13" text-anchor="middle" font-family="monospace">
    <text x="138" y="98">0</text><text x="238" y="98">1</text><text x="338" y="98">2</text><text x="438" y="98">3</text>
    <text x="538" y="98">4</text><text x="638" y="98">5</text><text x="738" y="98">6</text><text x="838" y="98">7</text>
  </g>

  <!-- cells: 0,1 = SENT (driver-owned DD=1); 2,3,4 = SENDING (device-owned DD=0); 5,6,7 = free -->
  <g text-anchor="middle">
    <!-- i0 -->
    <rect x="90"  y="110" width="96" height="72" rx="6" fill="#1b3a2a" stroke="#34d399" stroke-width="1.5"/>
    <text x="138" y="149" fill="#6ee7b7" font-size="17" font-weight="700">SENT</text>
    <text x="138" y="170" fill="#34d399" font-size="11" font-family="monospace">DD=1</text>
    <!-- i1 -->
    <rect x="190" y="110" width="96" height="72" rx="6" fill="#1b3a2a" stroke="#34d399" stroke-width="1.5"/>
    <text x="238" y="149" fill="#6ee7b7" font-size="17" font-weight="700">SENT</text>
    <text x="238" y="170" fill="#34d399" font-size="11" font-family="monospace">DD=1</text>
    <!-- i2 -->
    <rect x="290" y="110" width="96" height="72" rx="6" fill="#3a3115" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="338" y="149" fill="#fcd34d" font-size="15" font-weight="700">SENDING</text>
    <text x="338" y="170" fill="#fbbf24" font-size="11" font-family="monospace">DD=0</text>
    <!-- i3 -->
    <rect x="390" y="110" width="96" height="72" rx="6" fill="#3a3115" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="438" y="149" fill="#fcd34d" font-size="15" font-weight="700">SENDING</text>
    <text x="438" y="170" fill="#fbbf24" font-size="11" font-family="monospace">DD=0</text>
    <!-- i4 -->
    <rect x="490" y="110" width="96" height="72" rx="6" fill="#3a3115" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="538" y="149" fill="#fcd34d" font-size="15" font-weight="700">SENDING</text>
    <text x="538" y="170" fill="#fbbf24" font-size="11" font-family="monospace">DD=0</text>
    <!-- i5 -->
    <rect x="590" y="110" width="96" height="72" rx="6" fill="#22303f" stroke="#475569" stroke-width="1.5"/>
    <text x="638" y="149" fill="#94a3b8" font-size="17" font-weight="700">free</text>
    <text x="638" y="170" fill="#64748b" font-size="11" font-family="monospace">&#8211;</text>
    <!-- i6 -->
    <rect x="690" y="110" width="96" height="72" rx="6" fill="#22303f" stroke="#475569" stroke-width="1.5"/>
    <text x="738" y="149" fill="#94a3b8" font-size="17" font-weight="700">free</text>
    <text x="738" y="170" fill="#64748b" font-size="11" font-family="monospace">&#8211;</text>
    <!-- i7 -->
    <rect x="790" y="110" width="96" height="72" rx="6" fill="#22303f" stroke="#475569" stroke-width="1.5"/>
    <text x="838" y="149" fill="#94a3b8" font-size="17" font-weight="700">free</text>
    <text x="838" y="170" fill="#64748b" font-size="11" font-family="monospace">&#8211;</text>
  </g>

  <!-- cursors -->
  <g text-anchor="middle">
    <polygon points="138,188 129,207 147,207" fill="#e2e8f0"/>
    <text x="138" y="230" fill="#e2e8f0" font-size="13" font-weight="700" font-family="monospace">NTC</text>
    <polygon points="338,188 329,207 347,207" fill="#e2e8f0"/>
    <text x="338" y="230" fill="#e2e8f0" font-size="13" font-weight="700" font-family="monospace">TDH</text>
    <polygon points="638,188 629,207 647,207" fill="#e2e8f0"/>
    <text x="638" y="230" fill="#e2e8f0" font-size="13" font-weight="700" font-family="monospace">TDT / NTU</text>
  </g>

  <!-- legend -->
  <g font-size="14">
    <rect x="110" y="276" width="18" height="18" rx="3" fill="#1b3a2a" stroke="#34d399"/>
    <text x="138" y="290" fill="#e2e8f0"><tspan fill="#6ee7b7" font-weight="700">SENT</tspan> &#8211; DD = 1, driver-owned &#8211; completed, driver to reclaim (free the skb)</text>
    <text x="960" y="290" text-anchor="end" fill="#6ee7b7" font-family="monospace">[NTC, TDH)</text>

    <rect x="110" y="308" width="18" height="18" rx="3" fill="#3a3115" stroke="#fbbf24"/>
    <text x="138" y="322" fill="#e2e8f0"><tspan fill="#fcd34d" font-weight="700">SENDING</tspan> &#8211; DD = 0, device-owned &#8211; submitted, being sent on the wire</text>
    <text x="960" y="322" text-anchor="end" fill="#fcd34d" font-family="monospace">[TDH, TDT)</text>

    <rect x="110" y="340" width="18" height="18" rx="3" fill="#22303f" stroke="#475569"/>
    <text x="138" y="354" fill="#e2e8f0"><tspan fill="#94a3b8" font-weight="700">free</tspan> &#8211; available, DD don&#39;t-care &#8211; driver fills here, clearing DD as it goes</text>
  </g>

  <g font-size="13" fill="#cbd5e1">
    <text x="110" y="396"><tspan fill="#e2e8f0" font-weight="700">NTU</tspan> (next_to_use): driver producer cursor = next slot to fill; here = TDT, but may lead the</text>
    <text x="110" y="416">published TDT when the doorbell is batched (xmit_more / tx_coalesce, D-32).</text>
    <text x="110" y="444"><tspan fill="#e2e8f0" font-weight="700">NTC</tspan> (next_to_clean): driver reclaim cursor = next DD = 1 slot to free.</text>
  </g>
</svg>
