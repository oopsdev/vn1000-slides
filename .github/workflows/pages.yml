name: Deploy static site to Pages

# Actions-based Pages deploy (replaces the deprecated legacy Jekyll builder,
# which was intermittently erroring / hanging in "building"). This repo is a
# flat static mirror pushed here by oopsdev/Linux_NIC_Simulation's
# deploy-slides.yml; there is nothing to build, so we just upload the repo
# root as the Pages artifact and deploy it deterministically.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact (repo root, static)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
